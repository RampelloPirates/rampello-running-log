<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Log — Tally</title>
  <meta name="theme-color" content="#2C4530">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tally">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:      #3A5A40;   /* sage — primary accent */
      --red-dark: #2C4530;
      --black:    #1E241C;   /* warm near-black text */
      --bone:     #F4F1E9;   /* cream page background */
      --paper:    #FFFFFF;
      --slate:    #71776B;
      --slate-2:  #8A8F84;
      --silver:   #E2DCCF;
      --silver-2: #EBE6DA;
      --green:    #3A5A40;
      --green-deep:#2C4530;
      --amber:    #BE722A;
      --danger:   #A8443A;   /* destructive / errors */
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bone);
      color: var(--black);
      min-height: 100vh;
    }

    /* topbar */
    .topbar {
      background: var(--green-deep);
      color: var(--paper);
      padding: 0.85rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid var(--amber);
    }
    .brand {
      display: flex; align-items: baseline; gap: 0.6rem;
      text-decoration: none; color: inherit;
    }
    .brand .back { font-size: 1.35rem; font-weight: 700; line-height: 1; color: var(--amber); }
    .brand .name { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.3px; font-size: 1.1rem; color: var(--paper); }
    .brand .division { font-size: 0.7rem; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; }

    .user-area { position: relative; }
    .menu-btn {
      background: transparent; color: var(--paper);
      border: 1px solid var(--silver-2);
      width: 38px; height: 38px;
      border-radius: 3px; cursor: pointer;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      font-family: var(--font-body); padding: 0;
    }
    .menu-btn:hover { background: var(--red); border-color: var(--red); }
    .menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--paper); color: var(--black);
      border: 1px solid var(--silver-2); border-radius: 4px;
      min-width: 220px; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: none; z-index: 50; overflow: hidden;
    }
    .menu.show { display: block; }
    .menu-user {
      padding: 0.85rem 1rem; font-size: 0.85rem;
      color: var(--slate);
      border-bottom: 1px solid var(--silver-2);
      background: var(--bone);
    }
    .menu-item {
      display: block; width: 100%; text-align: left;
      background: none; border: none;
      padding: 0.75rem 1rem; font-size: 0.9rem;
      cursor: pointer; font-family: var(--font-body); color: var(--black);
      text-decoration: none;
    }
    .menu-item:hover { background: var(--bone); }
    .menu-item.danger { color: var(--danger); }

    /* main */
    main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem 1rem; }

    .page-title { font-size: 1.6rem; margin: 0 0 0.25rem 0; font-weight: 700; }
    .page-sub { color: var(--slate); margin: 0 0 1.5rem 0; font-size: 0.95rem; }

    h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--slate);
      margin: 0 0 0.85rem 0;
      font-weight: 700;
    }

    /* CTA log button */
    .log-cta {
      display: block;
      background: var(--red); color: var(--paper);
      padding: 1rem 1.25rem; border-radius: 4px;
      text-decoration: none;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      font-size: 0.9rem; text-align: center;
      margin-bottom: 1.5rem;
    }
    .log-cta:hover { background: var(--red-dark); }

    /* range filter */
    .range-filter {
      display: flex; gap: 0.25rem;
      background: var(--paper);
      border: 1px solid var(--silver-2);
      padding: 3px; border-radius: 4px;
      margin-bottom: 1rem;
      width: fit-content;
    }
    .range-btn {
      background: transparent; border: none;
      padding: 0.45rem 0.85rem;
      font-size: 0.8rem; cursor: pointer;
      font-family: var(--font-body); color: var(--slate);
      border-radius: 3px;
    }
    .range-btn.active {
      background: var(--black); color: var(--paper); font-weight: 700;
    }

    /* stat tiles */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-left: 4px solid var(--red);
      padding: 1rem;
      border-radius: 4px;
    }
    .stat .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-2);
      margin-bottom: 0.3rem;
      font-weight: 700;
    }
    .stat .value {
      font-size: 1.6rem; font-weight: 700; color: var(--black); line-height: 1;
    }
    .stat .unit { font-size: 0.75rem; color: var(--slate); margin-left: 0.2rem; font-weight: 400; }

    /* pace-by-type panel */
    .panel {
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-radius: 4px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .panel-heading {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--silver-2);
      background: var(--bone);
    }
    .panel-heading h3 {
      margin: 0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--slate);
      font-weight: 700;
    }

    .pace-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .pace-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-2);
      border-bottom: 1px solid var(--silver-2);
      font-weight: 700;
    }
    .pace-table th.num, .pace-table td.num { text-align: right; }
    .pace-table td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--silver-2);
    }
    .pace-table tr:last-child td { border-bottom: none; }
    .seg-pill {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      background: var(--silver-2);
      color: var(--slate);
    }
    .seg-warmup { background:#e3f2fd; color:#0d47a1; }
    .seg-easy   { background:#e8f5e9; color:#1b5e20; }
    .seg-tempo  { background:#fff3e0; color:#b45309; }
    .seg-threshold { background:#fff3e0; color:#a04000; }
    .seg-interval, .seg-hill { background:#ffebee; color:#b71c1c; }
    .seg-rest   { background:#ede7f6; color:#4527a0; }
    .seg-fartlek { background:#fce4ec; color:#880e4f; }
    .seg-strides { background:#e0f7fa; color:#006064; }
    .seg-cooldown { background:#e0e0e0; color:#424242; }

    /* run-list */
    .run-list { padding: 0; }
    .run-row {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--silver-2);
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 1rem;
      align-items: center;
      cursor: pointer;
    }
    .run-row:last-child { border-bottom: none; }
    .run-row:hover { background: var(--bone); }
    .run-row .date {
      font-size: 0.85rem; color: var(--slate);
    }
    .run-row .date strong { display: block; color: var(--black); font-size: 0.95rem; }
    .run-row .meta { font-size: 0.9rem; color: var(--slate); }
    .run-row .meta strong { color: var(--black); }
    .run-row .pace { font-size: 0.85rem; color: var(--slate-2); text-align: right; }
    .run-row .pace strong { display: block; color: var(--black); font-size: 0.95rem; }
    .run-segments {
      display: none;
      padding: 0.85rem 1.25rem 1.25rem 1.25rem;
      background: var(--bone);
      border-bottom: 1px solid var(--silver-2);
    }
    .run-segments.show { display: block; }
    .seg-mini-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.85rem;
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .seg-mini-table th, .seg-mini-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--silver-2);
      text-align: left;
    }
    .seg-mini-table th {
      background: var(--bone);
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--slate-2);
      letter-spacing: 1px;
      font-weight: 700;
    }
    .seg-mini-table tr:last-child td { border-bottom: none; }
    .seg-mini-table td.num { text-align: right; }
    .run-notes {
      margin-top: 0.85rem;
      padding: 0.75rem 1rem;
      background: var(--paper);
      border-left: 3px solid var(--silver);
      border-radius: 0 3px 3px 0;
      font-size: 0.9rem;
      color: var(--slate);
      font-style: italic;
    }

    .run-actions { margin-top: 0.85rem; text-align: right; display: flex; gap: 0.5rem; justify-content: flex-end; }
    .edit-run-btn {
      background: var(--paper); color: var(--slate);
      border: 1px solid var(--silver);
      padding: 0.45rem 0.85rem;
      font-size: 0.8rem; font-weight: 700;
      border-radius: 3px; cursor: pointer;
      font-family: var(--font-body);
      letter-spacing: 0.5px;
      text-decoration: none; display: inline-block;
    }
    .edit-run-btn:hover { background: var(--bone); border-color: var(--slate-2); color: var(--black); }
    .del-run-btn {
      background: var(--paper); color: var(--danger);
      border: 1px solid var(--danger);
      padding: 0.45rem 0.85rem;
      font-size: 0.8rem; font-weight: 700;
      border-radius: 3px; cursor: pointer;
      font-family: var(--font-body);
      letter-spacing: 0.5px;
    }
    .del-run-btn:hover { background: var(--danger); color: var(--paper); }

    /* change-password modal */
    .pw-modal { position: fixed; inset: 0; background: rgba(30,36,28,0.55); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
    .pw-modal.show { display: flex; }
    .pw-card { background: var(--paper); border: 1px solid var(--silver); border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 360px; box-shadow: 0 12px 40px rgba(44,69,48,0.18); }
    .pw-card h2 { font-family: var(--font-display); font-size: 1.1rem; margin: 0 0 0.75rem; color: var(--green-deep); }
    .pw-card label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--slate); font-weight: 700; margin: 0.75rem 0 0.3rem; }
    .pw-card input { width: 100%; padding: 0.7rem 0.85rem; border: 1px solid var(--silver); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--bone); }
    .pw-card input:focus { outline: none; border-color: var(--green); }
    .pw-msg { font-size: 0.85rem; margin-top: 0.6rem; min-height: 1.1em; }
    .pw-msg.error { color: var(--danger); }
    .pw-msg.success { color: var(--green); }
    .pw-actions { display: flex; gap: 0.6rem; margin-top: 1.1rem; }
    .pw-actions button { flex: 1; padding: 0.7rem; border-radius: 8px; font-family: var(--font-body); font-weight: 700; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; }
    .pw-actions .pw-save { background: var(--green); color: #fff; }
    .pw-actions .pw-cancel { background: transparent; color: var(--green); border: 1px solid var(--silver); }
    .del-run-btn:disabled { opacity: 0.6; cursor: default; }

    .empty { padding: 2.5rem 1.5rem; text-align: center; color: var(--slate-2); font-style: italic; }
    .loading { padding: 2.5rem; text-align: center; color: var(--slate-2); font-style: italic; }

    .grade-row { display: flex; align-items: center; gap: 0.5rem; margin: 0 0 1.25rem 0; }
    .grade-row label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--slate-2); font-weight: 700; }
    .grade-row select {
      padding: 0.4rem 0.6rem; border: 1px solid var(--silver-2); border-radius: 4px;
      font-family: var(--font-body); font-size: 0.9rem; background: var(--paper); color: var(--black);
    }
    .grade-status { font-size: 0.8rem; font-weight: 700; }

    .lb-teaser {
      display: flex; align-items: center; gap: 0.85rem;
      background: var(--black); color: var(--paper);
      border-left: 4px solid var(--red);
      border-radius: 4px; padding: 0.9rem 1.1rem;
      text-decoration: none; margin-bottom: 1.5rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .lb-teaser:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.28); }
    .lb-teaser-emoji { font-size: 1.7rem; line-height: 1; }
    .lb-teaser-copy { display: flex; flex-direction: column; gap: 0.12rem; }
    .lb-teaser-copy strong { font-size: 0.98rem; font-weight: 700; }
    .lb-teaser-sub { font-size: 0.82rem; color: var(--silver); }

    @media (max-width: 600px) {
      .run-row { grid-template-columns: 80px 1fr; }
      .run-row .pace { grid-column: 1 / -1; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="home.html" class="brand">
      <span class="back" aria-hidden="true">‹</span>
      <span class="name">Tally</span>
      <span class="division">Running</span>
    </a>
    <div class="user-area">
      <button class="menu-btn" id="menu-btn" aria-label="Menu" aria-haspopup="true">⋯</button>
      <div class="menu" id="menu" role="menu">
        <div class="menu-user" id="user-name">…</div>
        <a class="menu-item" href="home.html" role="menuitem">Home</a>
        <a class="menu-item" href="log_run.html" role="menuitem">Log a run</a>
        <button class="menu-item" id="change-pw-btn" role="menuitem">Change password</button>
        <button class="menu-item danger" id="signout-btn" role="menuitem">Sign out</button>
      </div>
    </div>
  </div>

  <main>
    <h1 class="page-title">Workout log</h1>
    <p class="page-sub">Your log, paces, and trends.</p>

    <a href="log_run.html" class="log-cta">+ Log an activity</a>

    <div class="range-filter" role="tablist" aria-label="Date range">
      <button class="range-btn active" data-range="week" role="tab">This week</button>
      <button class="range-btn" data-range="month" role="tab">This month</button>
      <button class="range-btn" data-range="year" role="tab">This year</button>
      <button class="range-btn" data-range="all" role="tab">All time</button>
    </div>
    <div class="range-filter" id="type-filter" role="tablist" aria-label="Activity type" style="margin-left:0.5rem;flex-wrap:wrap;"></div>
    <div class="range-filter" id="subtype-filter" role="tablist" aria-label="Run type" style="margin-left:0.5rem;flex-wrap:wrap;display:none;"></div>
    <p id="range-sub" style="margin:0 0 1rem 0;font-size:0.8rem;color:var(--slate-2);"></p>

    <div class="stats" id="stats">
      <div class="stat"><div class="label">Activities</div><div class="value" id="stat-runs">—</div></div>
      <div class="stat"><div class="label">Total time</div><div class="value" id="stat-time">—</div></div>
    </div>

    <div class="panel">
      <div class="panel-heading"><h3>Paces by segment type</h3></div>
      <div id="pace-table-wrap">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-heading"><h3>Run history</h3></div>
      <div id="run-list-wrap" class="run-list">
        <div class="loading">Loading…</div>
      </div>
    </div>
  </main>

  <div class="pw-modal" id="pw-modal" role="dialog" aria-modal="true" aria-label="Change password">
    <div class="pw-card">
      <h2>Change password</h2>
      <label for="pw-new">New password</label>
      <input type="password" id="pw-new" autocomplete="new-password" placeholder="••••••••">
      <label for="pw-confirm">Confirm new password</label>
      <input type="password" id="pw-confirm" autocomplete="new-password" placeholder="••••••••">
      <div class="pw-msg" id="pw-msg"></div>
      <div class="pw-actions">
        <button type="button" class="pw-cancel" id="pw-cancel">Cancel</button>
        <button type="button" class="pw-save" id="pw-save">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    // ---- menu ----
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('show'); });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== menuBtn) menu.classList.remove('show');
    });

    // ---- change password (signed in; no email) ----
    const pwModal = document.getElementById('pw-modal');
    const pwMsg = document.getElementById('pw-msg');
    function openPwModal() {
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
      pwMsg.textContent = ''; pwMsg.className = 'pw-msg';
      pwModal.classList.add('show');
      setTimeout(() => document.getElementById('pw-new').focus(), 50);
    }
    function closePwModal() { pwModal.classList.remove('show'); }
    document.getElementById('change-pw-btn').addEventListener('click', () => { menu.classList.remove('show'); openPwModal(); });
    document.getElementById('pw-cancel').addEventListener('click', closePwModal);
    pwModal.addEventListener('click', (e) => { if (e.target === pwModal) closePwModal(); });
    document.getElementById('pw-save').addEventListener('click', async () => {
      const a = document.getElementById('pw-new').value;
      const b = document.getElementById('pw-confirm').value;
      pwMsg.className = 'pw-msg';
      if (a.length < 6) { pwMsg.textContent = 'Use at least 6 characters.'; pwMsg.classList.add('error'); return; }
      if (a !== b) { pwMsg.textContent = "Passwords don't match."; pwMsg.classList.add('error'); return; }
      const saveBtn = document.getElementById('pw-save');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      const { error } = await sb.auth.updateUser({ password: a });
      saveBtn.disabled = false; saveBtn.textContent = 'Save';
      if (error) { pwMsg.textContent = error.message; pwMsg.classList.add('error'); }
      else { pwMsg.textContent = 'Password updated.'; pwMsg.classList.add('success'); setTimeout(closePwModal, 1200); }
    });
    document.getElementById('signout-btn').addEventListener('click', () => {
      if (!confirm("Sign out? You'll go back to the sign-in screen.")) return;
      signOut();
    });

    // ---- helpers ----
    function pad(n) { return String(n).padStart(2, '0'); }
    function formatDuration(sec) {
      if (sec == null) return '—';
      sec = Math.round(sec);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h) return `${h}:${pad(m)}:${pad(s)}`;
      return `${m}:${pad(s)}`;
    }
    function formatPace(secPerMile) {
      if (!secPerMile || !isFinite(secPerMile) || secPerMile <= 0) return '—';
      const m = Math.floor(secPerMile / 60);
      const s = Math.round(secPerMile % 60);
      return `${m}:${pad(s)} /mi`;
    }
    function formatMiles(m) {
      const n = Number(m);
      return (n < 10 ? n.toFixed(2) : n.toFixed(1));
    }
    function formatDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function rangeStartISO(period) {
      const now = new Date();
      if (period === 'all') return '1900-01-01';
      if (period === 'week') {
        const monday = new Date(now);
        const day = monday.getDay();
        const diff = (day + 6) % 7;
        monday.setDate(monday.getDate() - diff);
        monday.setHours(0, 0, 0, 0);
        return monday.toISOString().slice(0, 10);
      }
      if (period === 'month') {
        return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
      }
      if (period === 'year') {
        return new Date(now.getFullYear(), 0, 1).toISOString().slice(0, 10);
      }
      return '1900-01-01';
    }
    function rangeLabel(period) {
      const start = rangeStartISO(period);
      if (period === 'all') return 'All runs ever logged';
      const startD = new Date(start + 'T00:00:00');
      const today = new Date();
      const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (period === 'week') return 'Week of ' + fmt(startD) + ' (Mon–Sun)';
      if (period === 'month') return startD.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      if (period === 'year') return startD.getFullYear() + ' year-to-date';
      return fmt(startD) + ' – ' + fmt(today);
    }

    // ---- state ----
    let athlete = null;
    let activeRange = 'week';
    let activeType = 'all';
    let activeSub = 'all';
    let allRunsInRange = [];

    // Activity + sub-type vocabularies (mirror log_run.html and the sync worker).
    const ACT_LABEL = { run:'Run', ride:'Ride', swim:'Swim', walk:'Walk', hike:'Hike', strength:'Strength', workout:'Workout', other:'Other' };
    const ACT_ORDER = ['run','ride','swim','walk','hike','strength','workout','other'];
    const SUB_LABEL = { easy:'Easy', long:'Long', tempo:'Tempo', intervals:'Intervals', race:'Race', recovery:'Recovery', workout:'Workout' };
    const SUB_ORDER = ['easy','long','tempo','intervals','race','recovery','workout'];
    // Reuse the seg-* pill palette for a bit of colour per activity.
    function actClass(a) { return ({ run:'easy', ride:'strides', swim:'warmup', walk:'cooldown', hike:'fartlek', strength:'interval', workout:'rest' })[a] || 'cooldown'; }

    // ---- data load ----
    async function loadAll() {
      const startDate = rangeStartISO(activeRange);
      document.getElementById('range-sub').textContent = rangeLabel(activeRange);

      const { data: runs, error: runsErr } = await sb
        .from('runs')
        .select(`
          id, run_date, activity_type, sub_type, distance_miles, duration_seconds,
          effort_rpe, avg_cadence, max_cadence, avg_hr, max_hr, route, shoes,
          conditions, temperature_f, dewpoint_f, humidity_percent, wind_mph,
          mile_splits, samples, notes,
          run_segments(id, segment_order, segment_type, distance_miles, duration_seconds, avg_cadence, avg_hr, max_hr, notes)
        `)
        .eq('athlete_id', athlete.id)
        .gte('run_date', startDate)
        .order('run_date', { ascending: false })
        .order('created_at', { ascending: false });

      if (runsErr) {
        document.getElementById('pace-table-wrap').innerHTML = `<div class="empty">Error loading activities: ${escapeHtml(runsErr.message)}</div>`;
        return;
      }

      allRunsInRange = runs || [];
      // A range change can leave an active type/sub that no longer exists.
      if (activeType !== 'all' && !allRunsInRange.some(r => (r.activity_type || 'run') === activeType)) { activeType = 'all'; activeSub = 'all'; }
      buildTypeChips();
      rerenderWithFilter();
    }

    // ---- filter chips (built from what's actually in range) ----
    function buildTypeChips() {
      const present = [...new Set(allRunsInRange.map(r => r.activity_type || 'run'))]
        .sort((a, b) => ACT_ORDER.indexOf(a) - ACT_ORDER.indexOf(b));
      const chips = ['all', ...present];
      const wrap = document.getElementById('type-filter');
      wrap.innerHTML = chips.map(t =>
        `<button class="range-btn${t === activeType ? ' active' : ''}" data-type="${t}" role="tab">${t === 'all' ? 'All' : escapeHtml(ACT_LABEL[t] || t)}</button>`
      ).join('');
      wrap.querySelectorAll('.range-btn').forEach(b => b.addEventListener('click', () => {
        activeType = b.dataset.type; activeSub = 'all';
        buildTypeChips(); rerenderWithFilter();
      }));
      buildSubChips();
    }
    function buildSubChips() {
      const wrap = document.getElementById('subtype-filter');
      const present = (activeType === 'run')
        ? [...new Set(allRunsInRange.filter(r => (r.activity_type || 'run') === 'run').map(r => r.sub_type).filter(Boolean))]
            .sort((a, b) => SUB_ORDER.indexOf(a) - SUB_ORDER.indexOf(b))
        : [];
      if (!present.length) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
      wrap.style.display = 'flex';
      const chips = ['all', ...present];
      wrap.innerHTML = chips.map(t =>
        `<button class="range-btn${t === activeSub ? ' active' : ''}" data-sub="${t}" role="tab">${t === 'all' ? 'All runs' : escapeHtml(SUB_LABEL[t] || t)}</button>`
      ).join('');
      wrap.querySelectorAll('.range-btn').forEach(b => b.addEventListener('click', () => {
        activeSub = b.dataset.sub; buildSubChips(); rerenderWithFilter();
      }));
    }

    function rerenderWithFilter() {
      let filtered = allRunsInRange;
      if (activeType !== 'all') filtered = filtered.filter(r => (r.activity_type || 'run') === activeType);
      if (activeType === 'run' && activeSub !== 'all') filtered = filtered.filter(r => r.sub_type === activeSub);
      renderStats(filtered);
      renderPaceByType(filtered);
      renderRunList(filtered);
    }

    function renderStats(runs) {
      let totalSec = 0, totalMiles = 0, pMiles = 0, pSec = 0;
      runs.forEach(r => {
        if (r.duration_seconds) totalSec += Number(r.duration_seconds);
        if (r.distance_miles) totalMiles += Number(r.distance_miles);
        if (r.distance_miles && r.duration_seconds) { pMiles += Number(r.distance_miles); pSec += Number(r.duration_seconds); }
      });
      const tiles = [
        `<div class="stat"><div class="label">Activities</div><div class="value">${runs.length}</div></div>`,
        `<div class="stat"><div class="label">Total time</div><div class="value">${totalSec ? formatDuration(totalSec) : '—'}</div></div>`,
      ];
      // Miles + pace only make sense within a single activity type — show them
      // once you've filtered to one (e.g. Run) up top; the range pills set "the week".
      if (activeType !== 'all') {
        tiles.push(`<div class="stat"><div class="label">Total miles</div><div class="value">${totalMiles ? formatMiles(totalMiles) + '<span class="unit">mi</span>' : '—'}</div></div>`);
        const pace = (pMiles > 0 && pSec > 0) ? pSec / pMiles : null;
        tiles.push(`<div class="stat"><div class="label">Avg pace</div><div class="value">${pace ? formatPace(pace) : '—'}</div></div>`);
      }
      document.getElementById('stats').innerHTML = tiles.join('');
    }

    function renderPaceByType(runs) {
      // Aggregate segments by segment_type across all runs
      const byType = {}; // type -> { miles, seconds, count }
      runs.forEach(r => {
        (r.run_segments || []).forEach(s => {
          const t = s.segment_type;
          if (!byType[t]) byType[t] = { miles: 0, seconds: 0, count: 0 };
          if (s.distance_miles) byType[t].miles += Number(s.distance_miles);
          if (s.duration_seconds) byType[t].seconds += Number(s.duration_seconds);
          byType[t].count += 1;
        });
      });

      // Display order
      const order = ['warmup','easy','long','tempo','threshold','interval','hill','fartlek','strides','rest','cooldown'];
      const rows = order
        .filter(t => byType[t])
        .map(t => {
          const d = byType[t];
          const pace = d.miles > 0 && d.seconds > 0 ? d.seconds / d.miles : null;
          return `
            <tr>
              <td><span class="seg-pill seg-${t}">${t}</span></td>
              <td class="num">${d.miles ? formatMiles(d.miles) + ' mi' : '—'}</td>
              <td class="num">${d.seconds ? formatDuration(d.seconds) : '—'}</td>
              <td class="num"><strong>${formatPace(pace)}</strong></td>
              <td class="num" style="color:var(--slate-2)">${d.count}</td>
            </tr>
          `;
        }).join('');

      const wrap = document.getElementById('pace-table-wrap');
      if (!rows) {
        wrap.innerHTML = '<div class="empty">No segment data in this range. Log a run with segments to see your paces here.</div>';
        return;
      }
      wrap.innerHTML = `
        <table class="pace-table">
          <thead>
            <tr>
              <th>Type</th>
              <th class="num">Distance</th>
              <th class="num">Time</th>
              <th class="num">Avg pace</th>
              <th class="num"># seg</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderRunList(runs) {
      const wrap = document.getElementById('run-list-wrap');
      if (runs.length === 0) {
        wrap.innerHTML = '<div class="empty">No runs in this range yet. Log your first one!</div>';
        return;
      }

      wrap.innerHTML = runs.map(r => {
        const dist = r.distance_miles ? Number(r.distance_miles) : 0;
        const dur = r.duration_seconds ? Number(r.duration_seconds) : 0;
        const pace = (dist > 0 && dur > 0) ? dur / dist : null;
        const act = r.activity_type || 'run';
        const actLabel = ACT_LABEL[act] || act;
        const subPill = r.sub_type ? `<span class="seg-pill" style="background:var(--silver-2);color:var(--slate);margin-left:4px">${escapeHtml(SUB_LABEL[r.sub_type] || r.sub_type)}</span>` : '';
        const segs = (r.run_segments || []).sort((a, b) => (a.segment_order || 0) - (b.segment_order || 0));

        return `
          <div class="run-row" data-id="${r.id}">
            <div class="date">
              <strong>${formatDate(r.run_date)}</strong>
              <span class="seg-pill seg-${actClass(act)}">${escapeHtml(actLabel)}</span>${subPill}
            </div>
            <div class="meta">
              <strong>${dist ? formatMiles(dist) + ' mi' : ''}</strong>${dist && dur ? ' · ' : ''}${dur ? formatDuration(dur) : ''}
            </div>
            <div class="pace">
              <strong>${formatPace(pace)}</strong>
              ${r.effort_rpe ? `<span>RPE ${r.effort_rpe}</span>` : ''}
            </div>
          </div>
          <div class="run-segments" data-segments-for="${r.id}">
            ${renderSegmentDetail(segs, r)}
          </div>
        `;
      }).join('');

      // expand/collapse
      wrap.querySelectorAll('.run-row').forEach(row => {
        row.addEventListener('click', () => {
          const id = row.dataset.id;
          const detail = wrap.querySelector(`[data-segments-for="${id}"]`);
          if (detail) detail.classList.toggle('show');
        });
      });

      // delete (stopPropagation so it doesn't toggle the row it lives in)
      wrap.querySelectorAll('.del-run-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteRun(btn.dataset.delId, btn);
        });
      });
    }

    async function deleteRun(runId, btn) {
      if (!confirm('Delete this run? This can’t be undone.')) return;
      btn.disabled = true;
      btn.textContent = 'Deleting…';
      // Scope to this athlete as a safety net even though RLS is open. Segments
      // and race_results cascade-delete with the run.
      const { error } = await sb.from('runs')
        .delete()
        .eq('id', runId)
        .eq('athlete_id', athlete.id);
      if (error) {
        btn.disabled = false;
        btn.textContent = 'Delete run';
        alert('Could not delete the run: ' + error.message);
        return;
      }
      // Drop it from the cache and re-render stats/paces/list from what's left.
      allRunsInRange = allRunsInRange.filter(r => r.id !== runId);
      rerenderWithFilter();
    }

    // Derive each segment's avg cadence / avg+max HR from the run's sample
    // stream, by mapping the segment's cumulative-distance window onto the
    // samples (which carry cumulative miles). Needs samples (Strava runs).
    function segmentStreamStats(segs, samples) {
      if (!samples || !samples.length) return segs.map(() => ({}));
      let cum = 0;
      const bounds = segs.map(s => { const start = cum; cum += Number(s.distance_miles || 0); return { start, end: cum }; });
      const acc = segs.map(() => ({ cadSum: 0, cadN: 0, hrSum: 0, hrN: 0, hrMax: 0 }));
      samples.forEach(p => {
        if (p.mi == null) return;
        for (let i = 0; i < bounds.length; i++) {
          if (p.mi >= bounds[i].start && (p.mi < bounds[i].end || i === bounds.length - 1)) {
            if (p.cad != null) { acc[i].cadSum += p.cad; acc[i].cadN++; }
            if (p.hr != null) { acc[i].hrSum += p.hr; acc[i].hrN++; acc[i].hrMax = Math.max(acc[i].hrMax, p.hr); }
            break;
          }
        }
      });
      return acc.map(a => ({
        cad: a.cadN ? Math.round(a.cadSum / a.cadN) : null,
        hr: a.hrN ? Math.round(a.hrSum / a.hrN) : null,
        hrMax: a.hrMax || null,
      }));
    }

    // Summarize segments grouped by type (e.g. interval / rest) — time-weighted
    // cadence + HR, blended pace. Only shown when there's more than one type.
    function renderSegmentSummary(segs, ss) {
      const byType = {};
      segs.forEach((s, i) => {
        const g = byType[s.segment_type] || (byType[s.segment_type] = { miles: 0, seconds: 0, count: 0, cadW: 0, cadT: 0, hrW: 0, hrT: 0 });
        const sec = Number(s.duration_seconds || 0);
        g.miles += Number(s.distance_miles || 0); g.seconds += sec; g.count++;
        const st = ss[i] || {};
        if (st.cad != null && sec > 0) { g.cadW += st.cad * sec; g.cadT += sec; }
        if (st.hr != null && sec > 0) { g.hrW += st.hr * sec; g.hrT += sec; }
      });
      const order = ['warmup','easy','tempo','threshold','interval','hill','fartlek','strides','rest','cooldown'];
      const types = Object.keys(byType).sort((a, b) => order.indexOf(a) - order.indexOf(b));
      if (types.length < 2) return '';
      const hasStream = types.some(t => byType[t].cadT || byType[t].hrT);
      const rows = types.map(t => {
        const g = byType[t];
        const pace = (g.miles > 0 && g.seconds > 0) ? g.seconds / g.miles : null;
        const cad = g.cadT ? Math.round(g.cadW / g.cadT) : null;
        const hr = g.hrT ? Math.round(g.hrW / g.hrT) : null;
        return `
          <tr>
            <td><span class="seg-pill seg-${t}">${t}</span> <span style="color:var(--slate-2)">×${g.count}</span></td>
            <td class="num">${g.miles ? formatMiles(g.miles) + ' mi' : '—'}</td>
            <td class="num">${g.seconds ? formatDuration(g.seconds) : '—'}</td>
            <td class="num"><strong>${formatPace(pace)}</strong></td>
            ${hasStream ? `<td class="num">${cad || '—'}</td><td class="num">${hr || '—'}</td>` : ''}
          </tr>`;
      }).join('');
      return `
        <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--slate-2);font-weight:700;margin:0.85rem 0 0.4rem;">By segment type</div>
        <table class="seg-mini-table" style="margin-bottom:0.5rem;">
          <thead><tr><th>Type</th><th class="num">Dist</th><th class="num">Time</th><th class="num">Pace</th>${hasStream ? '<th class="num">Cad</th><th class="num">HR</th>' : ''}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ---- per-mile splits + cadence/HR charts (from Strava-synced runs) ----
    function renderMileSplits(splits) {
      if (!splits || !splits.length) return '';
      const rows = splits.map(s => {
        const partial = s.partial ? Number(s.partial) : null;
        const miDist = partial || 1;
        const label = partial ? ('Last ' + partial.toFixed(2) + ' mi') : ('Mile ' + s.mile);
        const pace = (s.seconds && miDist) ? s.seconds / miDist : null;
        return `
          <tr>
            <td>${label}</td>
            <td class="num">${s.seconds ? formatDuration(s.seconds) : '—'}</td>
            <td class="num"><strong>${formatPace(pace)}</strong></td>
            <td class="num">${s.avg_cadence || '—'}</td>
            <td class="num">${s.avg_hr || '—'}${s.max_hr ? ' / ' + s.max_hr : ''}</td>
          </tr>`;
      }).join('');
      return `
        <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--slate-2);font-weight:700;margin-bottom:0.4rem;">Per-mile splits</div>
        <table class="seg-mini-table" style="margin-bottom:0.85rem;">
          <thead><tr><th>Split</th><th class="num">Time</th><th class="num">Pace</th><th class="num">Cad</th><th class="num">HR a/m</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // Minimal inline SVG line chart — no library. series: [{x,y}].
    function svgChart(series, color, label) {
      const pts = series.filter(p => p.y != null && isFinite(p.y) && p.x != null);
      if (pts.length < 2) return '';
      const W = 320, H = 72, padL = 4, padR = 4, padT = 6, padB = 4;
      const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const spanX = (maxX - minX) || 1, spanY = (maxY - minY) || 1;
      const X = x => padL + ((x - minX) / spanX) * (W - padL - padR);
      const Y = y => padT + (1 - (y - minY) / spanY) * (H - padT - padB);
      const d = pts.map((p, i) => (i ? 'L' : 'M') + X(p.x).toFixed(1) + ' ' + Y(p.y).toFixed(1)).join(' ');
      return `
        <div style="margin-bottom:0.6rem;">
          <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--slate-2);font-weight:700;margin-bottom:2px;">${label} <span style="color:var(--slate);">${Math.round(minY)}–${Math.round(maxY)}</span></div>
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:72px;display:block;background:var(--paper);border:1px solid var(--silver-2);border-radius:3px;">
            <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
          </svg>
        </div>`;
    }

    function renderCharts(run) {
      const s = run.samples;
      if (!s || !s.length) return '';
      const cad = svgChart(s.map(p => ({ x: p.mi, y: p.cad })), '#3A5A40', 'Cadence (spm) over distance');
      const hr  = svgChart(s.map(p => ({ x: p.mi, y: p.hr })),  '#A8443A', 'Heart rate (bpm) over distance');
      if (!cad && !hr) return '';
      return `<div style="margin-bottom:0.5rem;">${cad}${hr}</div>`;
    }

    function renderSegmentDetail(segs, run) {
      let body = '';
      body += renderCharts(run);
      // Structured segments (a workout you logged, or laps) take precedence and
      // show cadence/HR per segment plus a grouped summary. Otherwise fall back
      // to the auto per-mile splits from the Strava stream.
      if (segs.length) {
        const ss = segmentStreamStats(segs, run.samples);
        // Prefer exact per-lap metrics (from Strava) when stored; otherwise use
        // the values derived from the sample stream.
        const stat = segs.map((s, i) => {
          const c = ss[i] || {};
          return {
            cad: s.avg_cadence != null ? s.avg_cadence : (c.cad != null ? c.cad : null),
            hr:  s.avg_hr != null ? s.avg_hr : (c.hr != null ? c.hr : null),
          };
        });
        const hasStream = stat.some(x => x.cad != null || x.hr != null);
        body += `
          <table class="seg-mini-table">
            <thead>
              <tr><th>#</th><th>Type</th><th class="num">Dist</th><th class="num">Time</th><th class="num">Pace</th>${hasStream ? '<th class="num">Cad</th><th class="num">HR</th>' : ''}</tr>
            </thead>
            <tbody>
              ${segs.map((s, i) => {
                const d = s.distance_miles ? Number(s.distance_miles) : 0;
                const t = s.duration_seconds ? Number(s.duration_seconds) : 0;
                const p = (d > 0 && t > 0) ? t / d : null;
                const st = stat[i] || {};
                return `
                  <tr>
                    <td>${s.segment_order || i+1}</td>
                    <td><span class="seg-pill seg-${s.segment_type}">${s.segment_type}</span></td>
                    <td class="num">${d ? formatMiles(d) + ' mi' : '—'}</td>
                    <td class="num">${t ? formatDuration(t) : '—'}</td>
                    <td class="num">${formatPace(p)}</td>
                    ${hasStream ? `<td class="num">${st.cad || '—'}</td><td class="num">${st.hr || '—'}</td>` : ''}
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
        body += renderSegmentSummary(segs, stat);
      } else if (run.mile_splits && run.mile_splits.length) {
        body += renderMileSplits(run.mile_splits);
      }

      // extras
      const extras = [];
      if (run.route) extras.push(`Route: ${escapeHtml(run.route)}`);
      if (run.shoes) extras.push(`Shoes: ${escapeHtml(run.shoes)}`);
      if (run.avg_cadence) extras.push(`Cadence: ${run.avg_cadence} spm`);
      if (run.max_cadence) extras.push(`Max cadence: ${run.max_cadence} spm`);
      if (run.avg_hr) extras.push(`Avg HR: ${run.avg_hr}`);
      if (run.max_hr) extras.push(`Max HR: ${run.max_hr}`);
      if (run.temperature_f != null) extras.push(`${run.temperature_f}°F`);
      if (run.dewpoint_f != null) extras.push(`Dew ${run.dewpoint_f}°F`);
      if (run.humidity_percent != null) extras.push(`${run.humidity_percent}% hum`);
      if (run.wind_mph != null) extras.push(`Wind ${run.wind_mph} mph`);
      if (run.conditions) extras.push(escapeHtml(run.conditions));
      if (extras.length) {
        body += `<div style="margin-top:0.6rem;font-size:0.85rem;color:var(--slate);">${extras.join(' · ')}</div>`;
      }

      if (run.notes) {
        body += `<div class="run-notes">${escapeHtml(run.notes)}</div>`;
      }

      body += `<div class="run-actions">
        <a class="edit-run-btn" href="log_run.html?edit=${run.id}">Edit run</a>
        <button class="del-run-btn" data-del-id="${run.id}">Delete run</button>
      </div>`;
      return body;
    }

    // Date-range pills trigger a re-fetch (date filter is server-side).
    document.querySelectorAll('.range-btn[data-range]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.range-btn[data-range]').forEach(x => x.classList.toggle('active', x === b));
        activeRange = b.dataset.range;
        loadAll();
      });
    });
    // Activity-type and sub-type chips are built dynamically in buildTypeChips()
    // / buildSubChips() with their own click handlers (client-side re-render).

    // ---- boot ----
    (async () => {
      const profile = await requireProfile();
      if (!profile) return;
      athlete = profile.row;
      document.getElementById('user-name').textContent = displayName(profile);
      loadAll();
    })();
  </script>
</body>
</html>
