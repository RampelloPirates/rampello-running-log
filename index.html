<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tampa Bay Pirates XC</title>
  <style>
    :root {
      --red:      #c8102e;
      --red-dark: #a00d24;
      --black:    #1a1a1a;
      --bone:     #f9f6f0;
      --slate:    #4a5568;
      --silver:   #d1d5db;
      --white:    #ffffff;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body:    'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--black);
      background-image:
        radial-gradient(circle at 20% 30%, rgba(200, 16, 46, 0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(200, 16, 46, 0.1), transparent 50%);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--bone);
      border-radius: 4px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 420px;
      border-top: 6px solid var(--red);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo .script {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--red);
      font-size: 1.4rem;
      letter-spacing: 0.5px;
      margin: 0;
      font-weight: 400;
    }

    .logo .name {
      font-family: var(--font-body);
      color: var(--black);
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin: -0.15rem 0 0 0;
      text-transform: uppercase;
    }

    .logo .division {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.2rem 0.75rem;
      background: var(--red);
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      border-radius: 2px;
    }

    .tagline {
      color: var(--slate);
      text-align: center;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      font-style: italic;
    }

    .tagline strong {
      color: var(--red);
      font-style: normal;
      font-weight: 700;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--slate);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    input[type="email"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--silver);
      border-radius: 3px;
      font-family: var(--font-body);
      background: var(--white);
      transition: border-color 0.15s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: var(--red);
    }

    button {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.95rem;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 0.95rem;
      font-family: var(--font-body);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: var(--red-dark); }
    button:disabled { background: var(--silver); cursor: wait; }

    #message {
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-size: 0.9rem;
      display: none;
      line-height: 1.4;
    }

    #message.success {
      display: block;
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }

    #message.error {
      display: block;
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }

    .footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.8rem;
      color: var(--slate);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <p class="script">Tampa Bay</p>
      <h1 class="name">Pirates</h1>
      <span class="division">Cross Country</span>
    </div>

    <p class="tagline"><strong>Finish Line Mentality.</strong><br>Sign in to log your runs.</p>

    <form id="login-form">
      <label for="email">Team email</label>
      <input
        type="email"
        id="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
        autofocus
      >
      <button type="submit" id="submit-btn">Send sign-in link</button>
    </form>

    <div id="message"></div>

    <div class="footer">
      Not on the roster? Ask Coach Sowell.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://dprmpgjgjppvdlyxlubr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwcm1wZ2pnanBwdmRseXhsdWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTI5MTgsImV4cCI6MjA5NDUyODkxOH0.lyhPhWYE8EqSRAIzwn0yQ36d6Ue2TZjZodZlQqfnDfI';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = type || '';
    }

    async function redirectByRole(user) {
      const { data: coach } = await sb
        .from('coaches')
        .select('id')
        .eq('auth_user_id', user.id)
        .eq('active', true)
        .maybeSingle();

      if (coach) {
        window.location.href = 'team_dashboard.html';
        return;
      }

      const { data: athlete } = await sb
        .from('athletes')
        .select('id')
        .eq('auth_user_id', user.id)
        .eq('active', true)
        .maybeSingle();

      if (athlete) {
        window.location.href = 'log_run.html';
        return;
      }

      showMessage(
        "Your email isn't on the roster yet. Ask a coach to add you, then try again.",
        'error'
      );
      await sb.auth.signOut();
    }

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) await redirectByRole(session.user);
    })();

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await redirectByRole(session.user);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      showMessage('', '');

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.origin + window.location.pathname,
          shouldCreateUser: true
        }
      });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Send sign-in link';

      if (error) {
        showMessage('Error: ' + error.message, 'error');
      } else {
        showMessage(
          'Check your email for a sign-in link. It may take a minute.',
          'success'
        );
      }
    });
  </script>
</body>
</html>
