name: Oura sync

on:
  schedule:
    - cron: "37 14 * * *"   # daily 14:37 UTC (~10:37 AM ET), just after Strava.
                            # Odd minute on purpose (GitHub drops round-number crons).
    - cron: "49 18 * * *"   # backup ~14:49 ET, in case the morning slot is dropped.
                            # Upserts by day, so a double run is a no-op.
  workflow_dispatch:          # run on demand from the Actions tab
    inputs:
      days:
        description: "Days back to sync (use a big number like 400 for a backfill)"
        default: "14"
        required: false

concurrency:
  group: oura-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r oura_sync/requirements.txt
      - name: Sync Oura → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SYNC_DAYS: ${{ github.event.inputs.days || '14' }}
        run: python oura_sync/oura_sync.py
