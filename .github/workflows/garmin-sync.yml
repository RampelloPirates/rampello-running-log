name: Garmin sync

on:
  schedule:
    - cron: "0 11 * * *"    # daily ~11:00 UTC (≈ 6–7am US Eastern). Adjust as you like.
  workflow_dispatch: {}       # lets you run it on demand from the Actions tab

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r garmin_sync/requirements.txt
      - name: Sync Garmin → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          GARMIN_TOKENS_BASE64: ${{ secrets.GARMIN_TOKENS_BASE64 }}
          SYNC_DAYS: "4"
        run: python garmin_sync/sync.py
