name: Strava sync

on:
  schedule:
    - cron: "17 14 * * *"   # daily 14:17 UTC (~10:17 AM ET). Off the top of the
                            # hour on purpose — GitHub queues/drops :00 crons under
                            # load, so an odd minute fires far more reliably.
    - cron: "43 18 * * *"   # backup ~14:43 ET, in case GitHub drops the morning
                            # slot. The sync dedups, so a double run is a no-op.
  workflow_dispatch:          # run on demand from the Actions tab
    inputs:
      days:
        description: "Days back to sync (use a big number like 3650 for a one-time backfill)"
        default: "7"
        required: false

concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r strava_sync/requirements.txt
      - name: Sync Strava → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          SYNC_DAYS: ${{ github.event.inputs.days || '7' }}
        run: python strava_sync/strava_sync.py
