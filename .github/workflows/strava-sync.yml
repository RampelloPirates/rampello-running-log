name: Strava sync

on:
  schedule:
    # GitHub's shared cron drops/delays runs by 1-2h, worst around 14:00 UTC
    # (US market open). So we fire several times, FRONT-LOADED into the early
    # morning UTC — even a 1-2h-delayed early run still lands in the morning ET.
    # The sync dedups on import_ref, so every run after the first is a no-op.
    - cron: "37 11 * * *"   # ~07:37 ET
    - cron: "7 13 * * *"    # ~09:07 ET
    - cron: "17 14 * * *"   # ~10:17 ET (nominal)
    - cron: "43 18 * * *"   # ~14:43 ET (afternoon backstop)
  workflow_dispatch:          # run on demand from the Actions tab
    inputs:
      days:
        description: "Days back to sync (use a big number like 3650 for a one-time backfill)"
        default: "7"
        required: false

concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r strava_sync/requirements.txt
      - name: Sync Strava → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_EMAIL: ${{ secrets.APP_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          SYNC_DAYS: ${{ github.event.inputs.days || '7' }}
        run: python strava_sync/strava_sync.py
