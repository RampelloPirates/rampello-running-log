<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — Tampa Bay Pirates XC</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8102e">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pirates XC">
  <style>
    :root {
      --red:      #c8102e;
      --red-dark: #a00d24;
      --black:    #1a1a1a;
      --bone:     #f9f6f0;
      --paper:    #ffffff;
      --slate:    #4a5568;
      --slate-2:  #6b7280;
      --silver:   #d1d5db;
      --silver-2: #e5e7eb;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body:    'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bone);
      color: var(--black);
      min-height: 100vh;
    }

    /* ---------- top bar ---------- */
    .topbar {
      background: var(--black);
      color: var(--paper);
      padding: 0.85rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid var(--red);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
    }
    .brand .script {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--red);
      font-size: 1rem;
    }
    .brand .name {
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 1.05rem;
    }
    .brand .division {
      font-size: 0.7rem;
      color: var(--silver);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .user-area { position: relative; }
    .menu-btn {
      background: transparent;
      color: var(--paper);
      border: 1px solid var(--silver-2);
      width: 38px;
      height: 38px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1;
      font-family: var(--font-body);
      padding: 0;
    }
    .menu-btn:hover { background: var(--red); border-color: var(--red); }

    .menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--paper);
      color: var(--black);
      border: 1px solid var(--silver-2);
      border-radius: 4px;
      min-width: 220px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: none;
      z-index: 50;
      overflow: hidden;
    }
    .menu.show { display: block; }
    .menu-user {
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: var(--slate);
      border-bottom: 1px solid var(--silver-2);
      background: var(--bone);
    }
    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: var(--font-body);
      color: var(--black);
    }
    .menu-item:hover { background: var(--bone); }
    .menu-item.danger { color: var(--red); }

    /* ---------- main ---------- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .breadcrumb a {
      color: var(--slate-2);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .breadcrumb a:hover { color: var(--red); }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0.5rem 0 1.5rem 0;
    }

    .page-title {
      font-size: 1.6rem;
      margin: 0;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--slate);
    }

    .btn-primary {
      background: var(--red);
      color: var(--paper);
      border: none;
      padding: 0.6rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .btn-primary:hover { background: var(--red-dark); }

    .btn-secondary {
      background: transparent;
      color: var(--black);
      border: 1px solid var(--silver);
      padding: 0.55rem 1rem;
      font-size: 0.85rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .btn-secondary:hover { border-color: var(--black); }

    /* ---------- table ---------- */
    .panel {
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-radius: 4px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-2);
      padding: 0.75rem 1rem;
      background: var(--bone);
      border-bottom: 1px solid var(--silver-2);
    }
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--silver-2);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.inactive { opacity: 0.55; }

    .row-actions {
      display: flex;
      gap: 0.4rem;
    }
    .row-btn {
      background: transparent;
      border: 1px solid var(--silver);
      color: var(--slate);
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .row-btn:hover { border-color: var(--black); color: var(--black); }
    .row-btn.danger:hover { border-color: var(--red); color: var(--red); }

    .empty {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--slate-2);
      font-style: italic;
    }
    .loading { text-align: center; padding: 3rem; color: var(--slate-2); }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1rem 0.45rem;
      border-radius: 8px;
      background: var(--silver-2);
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.linked { background: #e8f5e9; color: var(--red-dark); color: #1b5e20; }

    /* ---------- modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
    }
    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--paper);
      border-radius: 4px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border-top: 4px solid var(--red);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--silver-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--slate-2);
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-body { padding: 1.5rem; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate);
      margin-bottom: 0.3rem;
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      border: 1px solid var(--silver);
      border-radius: 3px;
      font-family: var(--font-body);
      background: var(--paper);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }
    textarea { resize: vertical; min-height: 60px; }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--silver-2);
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .form-error {
      color: #b71c1c;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }
    .form-error.show { display: block; }

    @media (max-width: 600px) {
      th.hide-mobile, td.hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="team_dashboard.html" class="brand">
      <span class="script">Tampa Bay</span>
      <span class="name">Pirates</span>
      <span class="division">XC</span>
    </a>
    <div class="user-area">
      <button class="menu-btn" id="menu-btn" aria-label="Menu" aria-haspopup="true">⋯</button>
      <div class="menu" id="menu" role="menu">
        <div class="menu-user" id="user-name">…</div>
        <button class="menu-item danger" id="signout-btn" role="menuitem">Sign out</button>
      </div>
    </div>
  </div>

  <main>
    <div class="breadcrumb"><a href="team_dashboard.html">← Dashboard</a></div>

    <div class="header-row">
      <h1 class="page-title">Roster</h1>
      <div class="toolbar">
        <label class="filter-toggle">
          <input type="checkbox" id="show-inactive"> Show inactive
        </label>
        <button class="btn-primary" id="add-btn">+ Add athlete</button>
      </div>
    </div>

    <div class="panel" id="table-panel">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <!-- Add / Edit modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add athlete</h2>
        <button class="modal-close" id="modal-close" type="button">×</button>
      </div>
      <form id="athlete-form">
        <div class="modal-body">
          <div class="form-grid">
            <div>
              <label for="f-first">First name</label>
              <input type="text" id="f-first" required>
            </div>
            <div>
              <label for="f-last">Last name</label>
              <input type="text" id="f-last" required>
            </div>
            <div class="full">
              <label for="f-email">Email</label>
              <input type="email" id="f-email" required>
            </div>
            <div>
              <label for="f-grade">Grade</label>
              <select id="f-grade">
                <option value="">—</option>
                <option value="3">3rd</option>
                <option value="4">4th</option>
                <option value="5">5th</option>
                <option value="6">6th</option>
                <option value="7">7th</option>
                <option value="8">8th</option>
              </select>
            </div>
            <div>
              <label for="f-gender">Gender</label>
              <select id="f-gender">
                <option value="">—</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="X">Other / prefer not</option>
              </select>
            </div>
            <div class="full">
              <label for="f-notes">Notes</label>
              <textarea id="f-notes" placeholder="Optional"></textarea>
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="form-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://dprmpgjgjppvdlyxlubr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwcm1wZ2pnanBwdmRseXhsdWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTI5MTgsImV4cCI6MjA5NDUyODkxOH0.lyhPhWYE8EqSRAIzwn0yQ36d6Ue2TZjZodZlQqfnDfI';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---- auth guard ----
    async function requireCoach() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return null; }

      const { data: coach } = await sb
        .from('coaches')
        .select('id, first_name, last_name')
        .eq('auth_user_id', session.user.id)
        .eq('active', true)
        .maybeSingle();

      if (!coach) {
        window.location.href = 'log_run.html';
        return null;
      }
      return coach;
    }

    // menu toggle
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== menuBtn) menu.classList.remove('show');
    });

    document.getElementById('signout-btn').addEventListener('click', async () => {
      if (!confirm("Sign out? You'll need to sign in again with a magic link.")) return;
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    // ---- state ----
    let editingId = null;
    let showInactive = false;

    // ---- load table ----
    async function loadRoster() {
      const panel = document.getElementById('table-panel');
      panel.innerHTML = '<div class="loading">Loading…</div>';

      let q = sb.from('athletes')
        .select('id, first_name, last_name, email, grade, gender, active, auth_user_id')
        .order('last_name', { ascending: true });

      if (!showInactive) q = q.eq('active', true);

      const { data, error } = await q;

      if (error) {
        panel.innerHTML = `<div class="empty">Error loading roster: ${error.message}</div>`;
        return;
      }
      if (!data || data.length === 0) {
        panel.innerHTML = '<div class="empty">No athletes yet. Click "+ Add athlete" to add the first one.</div>';
        return;
      }

      panel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th class="hide-mobile">Email</th>
              <th>Grade</th>
              <th class="hide-mobile">Signed in</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${data.map(a => `
              <tr class="${a.active ? '' : 'inactive'}" data-id="${a.id}">
                <td><a href="athlete_detail.html?id=${a.id}" style="color:var(--black);text-decoration:none;font-weight:700;border-bottom:1px dotted var(--silver);">${escapeHtml(a.last_name)}, ${escapeHtml(a.first_name)}</a>${a.active ? '' : ' <span class="badge">inactive</span>'}</td>
                <td class="hide-mobile">${escapeHtml(a.email)}</td>
                <td>${a.grade ? a.grade : '—'}</td>
                <td class="hide-mobile">${a.auth_user_id ? '<span class="badge linked">linked</span>' : '<span class="badge">pending</span>'}</td>
                <td>
                  <div class="row-actions">
                    <button class="row-btn" data-action="edit" data-id="${a.id}">Edit</button>
                    <button class="row-btn danger" data-action="toggle" data-id="${a.id}" data-active="${a.active}">${a.active ? 'Deactivate' : 'Reactivate'}</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      panel.querySelectorAll('[data-action="edit"]').forEach(b => {
        b.addEventListener('click', () => openModal(b.dataset.id));
      });
      panel.querySelectorAll('[data-action="toggle"]').forEach(b => {
        b.addEventListener('click', () => toggleActive(b.dataset.id, b.dataset.active === 'true'));
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
      ));
    }

    // ---- modal ----
    const modal = document.getElementById('modal');
    document.getElementById('add-btn').addEventListener('click', () => openModal(null));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);

    async function openModal(id) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Edit athlete' : 'Add athlete';
      document.getElementById('form-error').classList.remove('show');
      const form = document.getElementById('athlete-form');
      form.reset();

      if (id) {
        const { data: a } = await sb.from('athletes').select('*').eq('id', id).single();
        if (a) {
          document.getElementById('f-first').value = a.first_name || '';
          document.getElementById('f-last').value = a.last_name || '';
          document.getElementById('f-email').value = a.email || '';
          document.getElementById('f-grade').value = a.grade || '';
          document.getElementById('f-gender').value = a.gender || '';
          document.getElementById('f-notes').value = a.notes || '';
        }
      }

      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
      editingId = null;
    }

    // close modal on backdrop click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ---- save ----
    document.getElementById('athlete-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.classList.remove('show');

      const payload = {
        first_name: document.getElementById('f-first').value.trim(),
        last_name:  document.getElementById('f-last').value.trim(),
        email:      document.getElementById('f-email').value.trim().toLowerCase(),
        grade:      document.getElementById('f-grade').value || null,
        gender:     document.getElementById('f-gender').value || null,
        notes:      document.getElementById('f-notes').value.trim() || null,
      };

      const saveBtn = document.getElementById('form-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      let res;
      if (editingId) {
        res = await sb.from('athletes').update(payload).eq('id', editingId);
      } else {
        res = await sb.from('athletes').insert(payload);
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';

      if (res.error) {
        errorEl.textContent = res.error.message;
        errorEl.classList.add('show');
        return;
      }
      closeModal();
      loadRoster();
    });

    // ---- deactivate / reactivate ----
    async function toggleActive(id, currentlyActive) {
      const verb = currentlyActive ? 'Deactivate' : 'Reactivate';
      if (!confirm(`${verb} this athlete?`)) return;
      const { error } = await sb.from('athletes').update({ active: !currentlyActive }).eq('id', id);
      if (error) { alert('Error: ' + error.message); return; }
      loadRoster();
    }

    // ---- inactive toggle ----
    document.getElementById('show-inactive').addEventListener('change', (e) => {
      showInactive = e.target.checked;
      loadRoster();
    });

    // ---- boot ----
    (async () => {
      const coach = await requireCoach();
      if (!coach) return;
      document.getElementById('user-name').textContent = coach.first_name + ' ' + coach.last_name.charAt(0) + '.';
      loadRoster();
    })();
  </script>
</body>
</html>
