<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gym — Tally</title>
  <meta name="theme-color" content="#3A5A40">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tally">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#F4F1E9; --surface:#FFFFFF; --surface-warm:#FBF9F3; --ink:#1E241C;
      --muted:#71776B; --green:#3A5A40; --green-deep:#2C4530; --amber:#BE722A;
      --border:#E2DCCF; --green-tint:#EBF0E8; --danger:#A8443A;
      --f-display:'Space Grotesk',system-ui,sans-serif;
      --f-body:'Inter',system-ui,sans-serif;
      --f-mono:'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{overflow-x:hidden;}
    body{margin:0;font-family:var(--f-body);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}
    input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--green);outline-offset:1px;}
    .wrap{max-width:560px;margin:0 auto;padding:0 16px 48px;}
    header{padding:22px 0 14px;}
    .home-back{display:inline-block;font-size:13px;color:var(--muted);text-decoration:none;font-weight:600;margin-bottom:8px;}
    .home-back:hover{color:var(--green);}
    .logo{font-family:var(--f-display);font-size:20px;font-weight:700;margin:0;letter-spacing:-.3px;color:var(--green-deep);}
    .logo span{color:var(--amber);}
    .logo small{display:block;font-family:var(--f-body);font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.5px;margin-top:2px;}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
    .row-between{display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .kicker{font-family:var(--f-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .h2{font-family:var(--f-display);font-size:15px;margin:2px 0 10px;}
    .p{font-size:13px;color:var(--muted);margin:0 0 12px;line-height:1.5;}
    .fine{font-size:11px;color:var(--muted);text-align:center;line-height:1.5;}
    .empty{font-size:13px;color:var(--muted);font-style:italic;margin:0;}
    .loading{text-align:center;color:var(--muted);padding:60px 0;font-size:14px;}
    .err{color:var(--danger);font-size:13px;margin:10px 0 0;}
    .ok{color:var(--green);font-size:13px;margin:10px 0 0;}

    .btn{font-family:var(--f-body);font-weight:600;font-size:14px;border-radius:10px;cursor:pointer;border:1px solid transparent;padding:11px 16px;width:100%;transition:opacity .15s;}
    .btn:disabled{opacity:.45;cursor:default;}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-ghost{background:transparent;color:var(--green);border:1px solid var(--border);}
    .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--border);}
    .btn-sm{width:auto;padding:7px 12px;font-size:13px;}
    .field{font-family:var(--f-body);font-size:14px;color:var(--ink);border:1px solid var(--border);border-radius:10px;padding:11px;background:var(--surface-warm);width:100%;}
    textarea.field{resize:none;}

    /* Gym picker */
    .gymrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
    .gymrow:last-child{border-bottom:none;}
    .gymrow.sel{font-weight:600;color:var(--green-deep);}
    .gymrow .nm{flex:1;min-width:0;overflow-wrap:anywhere;font-size:14px;}
    .gymrow .ct{font-size:11px;color:var(--muted);font-family:var(--f-mono);}
    .x{background:none;border:none;color:var(--muted);font-size:19px;line-height:1;cursor:pointer;padding:2px 6px;flex-shrink:0;}
    .x:hover{color:var(--danger);}

    /* Equipment chips */
    .chips{display:flex;flex-wrap:wrap;gap:7px;}
    .chip{display:inline-flex;align-items:center;gap:6px;background:var(--green-tint);color:var(--green-deep);
          border-radius:99px;padding:5px 6px 5px 11px;font-size:12.5px;font-weight:500;max-width:100%;}
    .chip .d{color:var(--muted);font-weight:400;font-size:11px;}
    .chip button{background:none;border:none;color:var(--green-deep);opacity:.5;cursor:pointer;font-size:14px;line-height:1;padding:0 3px;}
    .chip button:hover{opacity:1;color:var(--danger);}

    /* Saved workouts */
    .fav{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;background:var(--surface-warm);}
    .fav.no{opacity:.62;}
    .fav .nm{font-weight:600;font-size:14px;overflow-wrap:anywhere;}
    .fav .ct{font-size:11px;color:var(--muted);font-family:var(--f-mono);margin-top:3px;}
    .fav .why{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45;}
    .fav.no .why{color:var(--danger);}

    /* Muscle group buttons */
    .msec{margin-bottom:14px;}
    .msec:last-child{margin-bottom:0;}
    .msec .kicker{display:block;margin-bottom:7px;}
    .muscles{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .muscle{font-family:var(--f-body);font-size:13.5px;font-weight:600;padding:13px 10px;border-radius:11px;
            border:1px solid var(--border);background:var(--surface-warm);color:var(--ink);cursor:pointer;}
    .muscle:hover{border-color:var(--green);color:var(--green-deep);}
    .muscle.sel{background:var(--green);color:#fff;border-color:var(--green);}

    /* Exercise menu */
    .eqgroup{margin-bottom:16px;}
    .eqgroup h3{font-family:var(--f-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;
                color:var(--amber);margin:0 0 8px;}
    .ex{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;background:var(--surface-warm);}
    .ex .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
    .ex .nm{font-weight:600;font-size:14px;min-width:0;overflow-wrap:anywhere;}
    .ex .pres{font-family:var(--f-mono);font-size:12px;color:var(--green-deep);white-space:nowrap;}
    .ex .tg{font-size:12px;color:var(--muted);margin-top:3px;}
    .ex .cue{font-size:12px;color:var(--ink);margin-top:6px;padding-left:9px;border-left:2px solid var(--amber);line-height:1.45;}
    .ex .last{font-size:11px;font-family:var(--f-mono);color:var(--amber);margin-top:6px;}
    .ex .acts{margin-top:9px;}

    /* Set logging */
    .setrow{display:flex;align-items:center;gap:7px;margin-top:7px;}
    .setrow .field{padding:8px;font-size:13px;text-align:center;}
    .setrow .lbl{font-size:11px;color:var(--muted);font-family:var(--f-mono);}
    .logged{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
    .setpill{font-family:var(--f-mono);font-size:11px;background:var(--green-tint);color:var(--green-deep);
             border-radius:6px;padding:3px 7px;}
  </style>
</head>
<body>
  <div class="wrap"><div id="app"><div class="loading">Loading…</div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
  // What you'd actually organise a session around. Specific enough to be useful
  // — "Legs" is a week of training, not a workout, and the exercises for quads
  // and calves have nothing to do with each other. The "(all)" options are still
  // there for the days you just want to hit the whole thing.
  var MUSCLES = [
    { label:'Push', items:['Chest','Shoulders','Triceps'] },
    { label:'Pull', items:['Back','Biceps','Forearms'] },
    { label:'Legs', items:['Quads','Hamstrings','Glutes','Calves','Legs (all)'] },
    { label:'Everything else', items:['Core','Full body'] }
  ];

  var S = { loaded:false, userId:null, athleteId:null,
            gyms:[], gymId:null, kit:[],
            muscle:null, groups:[], note:'',
            session:null, sets:[],           // the workout in progress
            history:[], openId:null,         // past workouts — NOT scoped to a gym
            favs:[], matches:{}, matching:false,   // saved workouts + can-I-do-it-here
            kitOpen:false,                   // the equipment list stays folded away once it exists
            newGym:'', kitText:'',
            busy:false, thinking:false, err:'', msg:'' };

  function el(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var gym = function(g){ return S.gyms.find(function(x){ return x.id===g; }); };

  // ── Data ──────────────────────────────────────────────────────────────────
  async function callGym(body){
    var s = await sb.auth.getSession();
    var res = await fetch(SUPABASE_URL+'/functions/v1/gym', {
      method:'POST',
      headers:{ 'Content-Type':'application/json',
                'Authorization':'Bearer '+s.data.session.access_token },
      body: JSON.stringify(body)
    });
    var out = await res.json();
    if(!res.ok) throw new Error(out.error || 'Something went wrong.');
    return out;
  }

  async function loadGyms(){
    var r = await sb.from('gyms').select('*').order('created_at');
    S.gyms = r.data || [];
    if(!S.gymId && S.gyms.length) S.gymId = S.gyms[0].id;
  }

  async function loadKit(){
    if(!S.gymId){ S.kit=[]; return; }
    var r = await sb.from('gym_equipment').select('*').eq('gym_id', S.gymId).order('category');
    S.kit = r.data || [];
  }

  async function addGym(){
    var name = S.newGym.trim();
    if(!name || S.busy) return;
    S.busy=true; S.err=''; render();
    try{
      var r = await sb.from('gyms').insert({ user_id:S.userId, name:name }).select('*').single();
      if(r.error) throw r.error;
      S.gyms.push(r.data); S.gymId = r.data.id; S.newGym=''; S.kit=[];
      S.muscle=null; S.groups=[]; S.matches={}; S.kitOpen=true;
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
    // A brand-new gym has no equipment yet, so there's nothing to match against.
    // matchFavs() runs again the moment the inventory lands — see loadKit callers.
  }

  // ── Favourites ────────────────────────────────────────────────────────────
  // A favourite remembers the gym it came from but isn't owned by it. When you
  // pick a gym, we ask whether that gym can actually support each saved workout
  // — which is a judgement about equivalence and load ("dumbbells" vs
  // "dumbbells 10–75 lb"), not a string match, so the model makes it.
  async function loadFavs(){
    var r = await sb.from('workout_favorites')
      .select('id, name, muscle_group, origin_gym_id, favorite_exercises(exercise, equipment, position)')
      .order('created_at', {ascending:false});
    S.favs = r.data || [];
  }

  async function matchFavs(){
    if(!S.gymId || !S.favs.length){ S.matches={}; return; }
    S.matching = true; render();
    try{
      var out = await callGym({ mode:'match_favorites', gym_id:S.gymId });
      var m = {};
      (out.matches||[]).forEach(function(x){ m[x.favorite_id] = x; });
      S.matches = m;
    }catch(e){ S.matches = {}; }   // a failed match just means no suggestions
    S.matching = false; render();
  }

  // Save what you just did — exercises in the order you did them, with the
  // equipment each needed. The equipment is what lets this workout travel.
  async function saveFavorite(){
    if(!S.session || !S.sets.length) return;
    var name = prompt('Name this workout', S.muscle+' at '+gym(S.gymId).name);
    if(!name || !name.trim()) return;

    S.busy = true; S.err=''; render();
    try{
      var f = await sb.from('workout_favorites').insert({
        user_id:S.userId, name:name.trim(), muscle_group:S.muscle, origin_gym_id:S.gymId
      }).select('*').single();
      if(f.error) throw f.error;

      var seen = [], rows = [];
      S.sets.slice().sort(function(a,b){ return (a.set_no||0)-(b.set_no||0); })
        .forEach(function(s){
          if(seen.indexOf(s.exercise) !== -1) return;
          seen.push(s.exercise);
          rows.push({ user_id:S.userId, favorite_id:f.data.id, exercise:s.exercise,
                      equipment:s.equipment, position:seen.length-1 });
        });
      if(rows.length) await sb.from('favorite_exercises').insert(rows);

      await loadFavs();
      S.msg = 'Saved "'+name.trim()+'". It\'ll be offered at any gym that can handle it.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  async function removeFavorite(id){
    if(!confirm('Forget this saved workout?')) return;
    await sb.from('workout_favorites').delete().eq('id', id);
    S.favs = S.favs.filter(function(f){ return f.id!==id; });
    render();
  }

  // Load a favourite as today's session at the gym you're in now, applying any
  // substitutions the model worked out for this gym.
  async function startFavorite(id){
    var f = S.favs.find(function(x){ return x.id===id; });
    if(!f || !S.gymId) return;
    var m = S.matches[id] || {};
    var swaps = {};
    (m.swaps||[]).forEach(function(s){ swaps[s.exercise] = s.use_instead; });

    S.muscle = f.muscle_group;
    S.note = (m.swaps && m.swaps.length)
      ? 'Swapped for this gym: ' + m.swaps.map(function(s){
          return s.exercise+' → '+s.use_instead; }).join('; ')
      : '';
    S.err=''; S.msg='';

    var byEq = {}, order = [];
    (f.favorite_exercises||[]).slice()
      .sort(function(a,b){ return (a.position||0)-(b.position||0); })
      .forEach(function(e){
        var name = swaps[e.exercise] || e.exercise;
        var eq = e.equipment || 'Exercises';
        if(!byEq[eq]){ byEq[eq]=[]; order.push(eq); }
        byEq[eq].push({ name:name, target:'', sets:'', reps:'', cue:'' });
      });
    S.groups = order.map(function(eq){ return { equipment:eq, exercises:byEq[eq] }; });

    await ensureSession(S.muscle);
    await loadSets();
    render();

    var names = [];
    S.groups.forEach(function(g){ (g.exercises||[]).forEach(function(e){ names.push(e.name); }); });
    if(names.length) loadLast(names);
    window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
  }

  // ── Finishing: the session becomes an entry in the workout log ─────────────
  // `runs` already carries activity_type ('strength'), and the log already
  // filters on it — so a finished gym session is a first-class entry there
  // rather than a second, parallel history nobody looks at.
  async function finishWorkout(){
    if(!S.session || !S.sets.length || S.busy) return;
    if(!S.athleteId){ S.err = 'No profile — can\'t post to the log.'; render(); return; }

    S.busy = true; S.err=''; render();
    try{
      var mins = Math.round((Date.now() - new Date(S.session.created_at).getTime())/60000);
      // Left the page open for three hours? That's not a three-hour workout.
      // Better to post no duration than a fictional one.
      if(!(mins > 0 && mins <= 240)) mins = null;

      var byEx = {}, order = [];
      S.sets.slice().sort(function(a,b){ return (a.set_no||0)-(b.set_no||0); })
        .forEach(function(s){
          if(!byEx[s.exercise]){ byEx[s.exercise]=[]; order.push(s.exercise); }
          byEx[s.exercise].push(s);
        });
      var summary = order.map(function(n){
        var ss = byEx[n];
        var w = ss.map(function(x){ return x.reps + (x.weight!=null ? '×'+x.weight : ''); }).join(', ');
        return n+': '+w;
      }).join('\n');

      var r = await sb.from('runs').insert({
        athlete_id: S.athleteId,
        run_date: S.session.worked_on,
        activity_type: 'strength',
        duration_seconds: mins ? mins*60 : null,
        notes: S.muscle+' — '+gym(S.gymId).name+'\n'+summary
      }).select('id').single();
      if(r.error) throw r.error;

      await sb.from('workout_sessions').update({ finished_at: new Date().toISOString() })
        .eq('id', S.session.id);

      S.session=null; S.sets=[]; S.groups=[]; S.muscle=null; S.note='';
      await loadHistory();
      S.msg = 'Workout logged. It\'s in your Workout Log.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  // ── History ───────────────────────────────────────────────────────────────
  // Deliberately NOT scoped to the selected gym. What you lifted is yours; it
  // shouldn't be reachable only by first picking the building you were in.
  // Sessions outlive their gym (gym_id is ON DELETE SET NULL) — a hotel gym you
  // used once and deleted still leaves its workout in your history.
  async function loadHistory(){
    var r = await sb.from('workout_sessions')
      .select('id, worked_on, muscle_group, gym_id, created_at, workout_sets(id, exercise, equipment, set_no, reps, weight, unit)')
      .order('worked_on', {ascending:false})
      .order('created_at', {ascending:false})
      .limit(40);
    // An empty session is an artefact of browsing the menu without lifting.
    // It isn't a workout and shouldn't clutter the history.
    S.history = (r.data || []).filter(function(s){ return (s.workout_sets||[]).length; });
    if(S.loaded) render();   // callers after boot fire-and-forget this
  }

  // Pull a past workout forward: same muscle group, same exercises, logged fresh
  // against today at whichever gym you're standing in now. This is the "return
  // to a previous activity" path — no regeneration, no waiting on Claude.
  async function repeat(sessionId){
    var past = S.history.find(function(s){ return s.id===sessionId; });
    if(!past || !S.gymId) return;

    S.muscle = past.muscle_group;
    S.note = '';
    S.err=''; S.msg='';

    // Rebuild the menu from what was actually done, grouped by equipment,
    // preserving the order the sets were logged in.
    var byEq = {}, order = [];
    (past.workout_sets || []).slice()
      .sort(function(a,b){ return (a.set_no||0)-(b.set_no||0); })
      .forEach(function(s){
        var eq = s.equipment || 'Exercises';
        if(!byEq[eq]){ byEq[eq] = []; order.push(eq); }
        if(!byEq[eq].some(function(e){ return e.name===s.exercise; })){
          byEq[eq].push({ name:s.exercise, target:'', sets:'', reps:'', cue:'' });
        }
      });
    S.groups = order.map(function(eq){ return { equipment:eq, exercises:byEq[eq] }; });

    await ensureSession(S.muscle);
    await loadSets();
    S.openId = null;
    render();

    var names = [];
    S.groups.forEach(function(g){ (g.exercises||[]).forEach(function(e){ names.push(e.name); }); });
    if(names.length) loadLast(names);
    window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
  }

  async function removeSession(id){
    if(!confirm('Delete this workout and its sets? This can\'t be undone.')) return;
    await sb.from('workout_sessions').delete().eq('id', id);
    S.history = S.history.filter(function(s){ return s.id!==id; });
    if(S.session && S.session.id===id){ S.session=null; S.sets=[]; }
    render();
  }

  async function removeGym(id){
    if(!confirm('Remove this gym and its equipment list?\n\nYour workout history is kept — past workouts at this gym stay in your log.')) return;
    await sb.from('gyms').delete().eq('id', id);
    S.gyms = S.gyms.filter(function(g){ return g.id!==id; });
    if(S.gymId===id){ S.gymId = S.gyms.length ? S.gyms[0].id : null; S.muscle=null; S.groups=[]; await loadKit(); }
    render();
  }

  async function pickGym(id){
    S.gymId = id; S.muscle=null; S.groups=[]; S.note=''; S.msg=''; S.kitOpen=false;
    S.matches={};
    await loadKit(); render();
    matchFavs();   // "which of my workouts can I do here?" — the point of favourites
  }

  // ── Inventory ─────────────────────────────────────────────────────────────
  async function inventoryPhotos(files){
    if(!files || !files.length || S.busy || !S.gymId) return;
    S.busy=true; S.err=''; S.msg=''; render();
    try{
      var imgs = [];
      for(var i=0;i<files.length;i++) imgs.push(await toBase64(files[i]));
      var out = await callGym({ mode:'inventory', gym_id:S.gymId, images:imgs });
      await loadKit();
      S.kitOpen = true;   // something landed — show them what
      S.msg = out.added.length
        ? 'Added '+out.added.length+' new '+(out.added.length===1?'item':'items')+'.'
        : 'Nothing new — everything in those photos was already on the list.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
    matchFavs();   // a newly-stocked gym may now be able to do your favourites
  }

  async function inventoryText(){
    if(!S.kitText.trim() || S.busy || !S.gymId) return;
    S.busy=true; S.err=''; S.msg=''; render();
    try{
      var out = await callGym({ mode:'inventory', gym_id:S.gymId, text:S.kitText.trim() });
      await loadKit();
      S.kitText=''; S.kitOpen = true;
      S.msg = 'Added '+out.added.length+' '+(out.added.length===1?'item':'items')+'.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
    matchFavs();
  }

  async function removeKit(id){
    await sb.from('gym_equipment').delete().eq('id', id);
    S.kit = S.kit.filter(function(k){ return k.id!==id; });
    // The menu was built from the old list, so it's now a lie. Drop it.
    S.groups=[]; S.muscle=null;
    render();
  }

  function toBase64(file){
    return new Promise(function(res, rej){
      var r = new FileReader();
      r.onload = function(){ res(String(r.result).split(',')[1]); };
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  // ── Exercises ─────────────────────────────────────────────────────────────
  async function pickMuscle(m){
    if(S.thinking || !S.gymId) return;
    S.muscle = m; S.thinking=true; S.err=''; S.msg=''; S.groups=[]; S.note='';
    render();
    try{
      var out = await callGym({ mode:'exercises', gym_id:S.gymId, muscle:m });
      S.groups = out.groups || [];
      S.note = out.note || '';
      await ensureSession(m);
      await loadSets();
    }catch(e){ S.err = e.message; S.muscle=null; }
    S.thinking=false; render();

    // Fill in "last time: 8 reps @ 55" behind the render, so the menu appears
    // immediately and the history trickles in rather than holding it up.
    var names = [];
    S.groups.forEach(function(g){ (g.exercises||[]).forEach(function(e){ names.push(e.name); }); });
    if(names.length) loadLast(names);
  }

  // ── Logging ───────────────────────────────────────────────────────────────
  // A session is created lazily the first time you ask for exercises, so the
  // sets you log have somewhere to go — but an unused one is harmless: it just
  // has no sets, and the history view ignores empty sessions.
  async function ensureSession(muscle){
    var today = new Date().toISOString().slice(0,10);
    var r = await sb.from('workout_sessions').select('*')
      .eq('gym_id', S.gymId).eq('muscle_group', muscle).eq('worked_on', today)
      .is('finished_at', null).limit(1);
    if(r.data && r.data.length){ S.session = r.data[0]; return; }
    var c = await sb.from('workout_sessions').insert({
      user_id:S.userId, gym_id:S.gymId, muscle_group:muscle, worked_on:today
    }).select('*').single();
    S.session = c.data;
  }

  async function loadSets(){
    if(!S.session){ S.sets=[]; return; }
    var r = await sb.from('workout_sets').select('*')
      .eq('session_id', S.session.id).order('created_at');
    S.sets = r.data || [];
  }

  async function logSet(name, equipment){
    var reps = el('reps-'+cssId(name)).value.trim();
    var wt   = el('wt-'+cssId(name)).value.trim();
    if(!reps){ S.err='Reps, at least — a set without reps isn\'t a set.'; render(); return; }
    if(!S.session) await ensureSession(S.muscle);

    var done = S.sets.filter(function(s){ return s.exercise===name; }).length;
    var r = await sb.from('workout_sets').insert({
      user_id:S.userId, session_id:S.session.id, exercise:name, equipment:equipment,
      set_no: done+1, reps: parseInt(reps,10), weight: wt ? parseFloat(wt) : null
    }).select('*').single();
    if(r.error){ S.err = r.error.message; render(); return; }
    S.sets.push(r.data);
    S.err='';
    render();
    // Keep the weight for the next set — you rarely change it between sets.
    var w = el('wt-'+cssId(name)); if(w) w.value = wt;
    loadHistory();   // today's session becomes history the moment it has a set
  }

  async function undoSet(id){
    await sb.from('workout_sets').delete().eq('id', id);
    S.sets = S.sets.filter(function(s){ return s.id!==id; });
    render();
    loadHistory();
  }

  // What you did on this exercise last time, at any gym. The single most useful
  // thing a log can tell you, and the reason to bother logging at all.
  var LAST = {};
  async function loadLast(names){
    var todo = names.filter(function(n){ return !(n.toLowerCase() in LAST); });
    if(!todo.length) return;
    for(var i=0;i<todo.length;i++){
      var n = todo[i];
      var r = await sb.from('workout_sets').select('reps, weight, unit, created_at')
        .ilike('exercise', n)
        .lt('created_at', S.session ? S.session.created_at : new Date().toISOString())
        .order('created_at', {ascending:false}).limit(1);
      LAST[n.toLowerCase()] = (r.data && r.data[0]) || null;
    }
    render();
  }

  function cssId(s){ return s.replace(/[^a-z0-9]/gi,'').toLowerCase(); }

  // ── Render ────────────────────────────────────────────────────────────────
  function exCard(ex, equipment){
    var id = cssId(ex.name);
    var mine = S.sets.filter(function(s){ return s.exercise===ex.name; });
    var last = LAST[ex.name.toLowerCase()];

    // A repeated workout has no prescription, target or cue — it's just the
    // exercises you did last time. Render around the gaps instead of printing
    // empty scaffolding.
    var h = '<div class="ex"><div class="top">'+
      '<span class="nm">'+esc(ex.name)+'</span>'+
      (ex.sets && ex.reps ? '<span class="pres">'+esc(ex.sets)+' × '+esc(ex.reps)+'</span>' : '')+
      '</div>'+
      (ex.target ? '<div class="tg">'+esc(ex.target)+'</div>' : '')+
      (ex.cue ? '<div class="cue">'+esc(ex.cue)+'</div>' : '');

    if(last){
      h += '<div class="last">last time: '+last.reps+' reps'+
           (last.weight!=null ? ' @ '+last.weight+' '+esc(last.unit||'lb') : '')+'</div>';
    }

    if(mine.length){
      h += '<div class="logged">'+mine.map(function(s){
        return '<span class="setpill">'+s.reps+(s.weight!=null?'×'+s.weight:'')+
          ' <button class="x" style="font-size:12px;padding:0 2px" onclick="undoSet(\''+s.id+'\')">×</button></span>';
      }).join('')+'</div>';
    }

    h += '<div class="setrow">'+
      '<input class="field" id="reps-'+id+'" type="number" inputmode="numeric" placeholder="reps">'+
      '<input class="field" id="wt-'+id+'" type="number" inputmode="decimal" step="any" placeholder="lb">'+
      '<button class="btn btn-ghost btn-sm" onclick="logSet('+JSON.stringify(ex.name).replace(/"/g,'&quot;')+
        ','+JSON.stringify(equipment).replace(/"/g,'&quot;')+')">Log set</button>'+
      '</div></div>';
    return h;
  }

  function fmtDate(d){
    var t = new Date(d+'T12:00:00');
    var today = new Date(); today.setHours(12,0,0,0);
    var days = Math.round((today - t)/86400000);
    if(days===0) return 'Today';
    if(days===1) return 'Yesterday';
    if(days < 7) return t.toLocaleDateString(undefined,{weekday:'long'});
    return t.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  }

  function historyCard(){
    // The current workout is on screen above; showing it again down here as
    // "history" would just be confusing.
    var past = S.history.filter(function(s){ return !S.session || s.id!==S.session.id; });

    var h = '<section class="card"><h2 class="h2">Previous workouts</h2>';
    if(!past.length){
      h += '<p class="empty">Nothing logged yet. Sets you record show up here — whatever gym you were in.</p></section>';
      return h;
    }

    h += past.map(function(s){
      var sets = s.workout_sets || [];
      var g = s.gym_id ? gym(s.gym_id) : null;
      var where = g ? g.name : 'a gym you\'ve since removed';
      var open = S.openId === s.id;

      var hh = '<div class="gymrow" style="align-items:flex-start;cursor:pointer" onclick="S.openId='+
        (open?'null':'\''+s.id+'\'')+';render()">'+
        '<span class="nm"><b>'+esc(s.muscle_group)+'</b>'+
          '<span class="ct" style="display:block;margin-top:2px">'+esc(fmtDate(s.worked_on))+
          ' · '+esc(where)+' · '+sets.length+' set'+(sets.length===1?'':'s')+'</span></span>'+
        '<span class="ct">'+(open?'▾':'▸')+'</span></div>';

      if(open){
        // Group the sets back under their exercise, in the order they were done.
        var byEx = {}, order = [];
        sets.slice().sort(function(a,b){ return (a.set_no||0)-(b.set_no||0); })
          .forEach(function(x){
            if(!byEx[x.exercise]){ byEx[x.exercise]=[]; order.push(x.exercise); }
            byEx[x.exercise].push(x);
          });

        hh += '<div style="padding:4px 0 12px">'+order.map(function(name){
          return '<div style="margin-bottom:9px">'+
            '<div style="font-size:13px;font-weight:600">'+esc(name)+'</div>'+
            '<div class="logged">'+byEx[name].map(function(x){
              return '<span class="setpill">'+x.reps+(x.weight!=null?' × '+x.weight+' '+esc(x.unit||'lb'):'')+'</span>';
            }).join('')+'</div></div>';
        }).join('')+
        (S.gymId
          ? '<button class="btn btn-ghost btn-sm" onclick="repeat(\''+s.id+'\')">Do this again at '+esc(gym(S.gymId).name)+'</button> '
          : '')+
        '<button class="btn btn-danger btn-sm" onclick="removeSession(\''+s.id+'\')">Delete</button>'+
        '</div>';
      }
      return hh;
    }).join('');

    return h + '</section>';
  }

  function render(){
    var app = el('app');
    if(!S.loaded){ app.innerHTML='<div class="loading">Loading…</div>'; return; }

    var h = '<header><a href="home.html" class="home-back">‹ Home</a>'+
      '<h1 class="logo">Tally<span>.</span><small>Gym</small></h1></header>';

    // ── Gyms
    h += '<section class="card"><h2 class="h2">Your gyms</h2>';
    if(!S.gyms.length){
      h += '<p class="p">Add the places you actually train — your garage, the Y, the hotel gym you\'re stuck with this week. Each one gets its own equipment list.</p>';
    }else{
      h += S.gyms.map(function(g){
        var n = (g.id===S.gymId) ? S.kit.length : null;
        return '<div class="gymrow'+(g.id===S.gymId?' sel':'')+'">'+
          '<span class="nm" onclick="pickGym(\''+g.id+'\')" style="cursor:pointer">'+esc(g.name)+'</span>'+
          (n!==null ? '<span class="ct">'+n+' item'+(n===1?'':'s')+'</span>' : '')+
          '<button class="x" onclick="removeGym(\''+g.id+'\')" title="Remove">×</button></div>';
      }).join('');
    }
    h += '<div class="setrow" style="margin-top:12px">'+
      '<input class="field" id="newgym" placeholder="Add a gym — &quot;Garage&quot;, &quot;YMCA&quot;" '+
        'value="'+esc(S.newGym)+'" oninput="S.newGym=this.value" style="text-align:left">'+
      '<button class="btn btn-ghost btn-sm" onclick="addGym()"'+(S.busy?' disabled':'')+'>Add</button>'+
      '</div></section>';

    // History renders even with no gym selected — it isn't the gym's, it's yours.
    if(!S.gymId){ app.innerHTML = h + historyCard(); return; }

    // ── Equipment
    // Once a gym is inventoried you never want to look at this again — it's
    // setup, not a daily surface. So it folds shut and stays that way, unless
    // there's nothing in it yet (then it's the whole point of the screen).
    var kitOpen = S.kitOpen || !S.kit.length;

    h += '<section class="card">'+
      '<div class="row-between" style="cursor:pointer"'+
        (S.kit.length ? ' onclick="S.kitOpen=!S.kitOpen;render()"' : '')+'>'+
      '<h2 class="h2" style="margin:0">What\'s in '+esc(gym(S.gymId).name)+'</h2>'+
      '<span class="kicker">'+(S.kit.length
        ? S.kit.length+' item'+(S.kit.length===1?'':'s')+' '+(kitOpen?'▾':'▸')
        : 'empty')+'</span></div>';

    if(kitOpen){
      h += '<div style="margin-top:12px">';
      if(!S.kit.length){
        h += '<p class="p">Photograph the gym — a few wide shots covering the racks, the machines, the dumbbells. Claude reads the equipment off them. Get the dumbbell rack in frame if you can: the weight range is what decides whether a suggestion is any use.</p>';
      }else{
        h += '<div class="chips">'+S.kit.map(function(k){
          return '<span class="chip">'+esc(k.name)+
            (k.detail?' <span class="d">'+esc(k.detail)+'</span>':'')+
            '<button onclick="removeKit(\''+k.id+'\')" title="Remove">×</button></span>';
        }).join('')+'</div>';
      }

      h += '<input id="photos" type="file" accept="image/*" multiple style="display:none" onchange="inventoryPhotos(this.files)">'+
        '<button class="btn btn-primary" style="margin-top:14px" onclick="el(\'photos\').click()"'+(S.busy?' disabled':'')+'>'+
          (S.busy?'Reading the room…':'📷 Photograph the gym')+'</button>'+
        '<div class="setrow" style="margin-top:10px">'+
        '<input class="field" placeholder="or type it: dumbbells to 50, a bench, pull-up bar" '+
          'value="'+esc(S.kitText)+'" oninput="S.kitText=this.value" style="text-align:left">'+
        '<button class="btn btn-ghost btn-sm" onclick="inventoryText()"'+(S.busy?' disabled':'')+'>Add</button>'+
        '</div></div>';
    }
    if(S.err) h += '<p class="err">'+esc(S.err)+'</p>';
    if(S.msg) h += '<p class="ok">'+esc(S.msg)+'</p>';
    h += '</section>';

    // ── Favourites
    // Sorted so the ones this gym can actually do come first. A favourite that
    // doesn't fit still shows — greyed, with the reason — because "your chest
    // day needs a cable machine and this place hasn't got one" is useful to
    // know, and silently hiding it just looks like the app lost your workout.
    if(S.favs.length){
      var doable = S.favs.filter(function(f){ return (S.matches[f.id]||{}).doable; });
      var nope   = S.favs.filter(function(f){ return !(S.matches[f.id]||{}).doable; });

      h += '<section class="card"><div class="row-between" style="margin-bottom:10px">'+
        '<h2 class="h2" style="margin:0">Saved workouts</h2>'+
        (S.matching ? '<span class="kicker">checking…</span>'
                    : '<span class="kicker">'+doable.length+' fit here</span>')+
        '</div>';

      h += doable.concat(nope).map(function(f){
        var m = S.matches[f.id] || {};
        var ok = !!m.doable;
        var from = f.origin_gym_id ? gym(f.origin_gym_id) : null;
        var n = (f.favorite_exercises||[]).length;

        return '<div class="fav'+(ok?'':' no')+'">'+
          '<div class="row-between" style="align-items:flex-start">'+
            '<div style="min-width:0">'+
              '<div class="nm">★ '+esc(f.name)+'</div>'+
              '<div class="ct">'+esc(f.muscle_group)+' · '+n+' exercise'+(n===1?'':'s')+
                (from && from.id!==S.gymId ? ' · from '+esc(from.name) : '')+'</div>'+
              (m.why ? '<div class="why">'+esc(m.why)+'</div>' : '')+
            '</div>'+
            '<button class="x" onclick="removeFavorite(\''+f.id+'\')" title="Forget">×</button>'+
          '</div>'+
          (ok ? '<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="startFavorite(\''+f.id+'\')">'+
                  'Do this here'+((m.swaps||[]).length ? ' (with '+m.swaps.length+' swap'+(m.swaps.length===1?'':'s')+')' : '')+
                '</button>' : '')+
          '</div>';
      }).join('');
      h += '</section>';
    }

    // ── Muscle group
    h += '<section class="card"><h2 class="h2">Train what?</h2>'+
      MUSCLES.map(function(sec){
        return '<div class="msec"><span class="kicker">'+esc(sec.label)+'</span>'+
          '<div class="muscles">'+sec.items.map(function(m){
            return '<button class="muscle'+(S.muscle===m?' sel':'')+'" onclick="pickMuscle('+
              JSON.stringify(m).replace(/"/g,'&quot;')+')"'+(S.thinking?' disabled':'')+'>'+esc(m)+'</button>';
          }).join('')+'</div></div>';
      }).join('')+'</section>';

    // ── The menu
    if(S.thinking){
      h += '<section class="card"><div class="loading">Working out what '+esc(gym(S.gymId).name)+
        ' can actually do for '+esc(S.muscle.toLowerCase())+'…</div></section>';
    }else if(S.groups.length){
      var total = S.sets.length;
      h += '<section class="card"><div class="row-between" style="margin-bottom:12px">'+
        '<h2 class="h2" style="margin:0">'+esc(S.muscle)+' at '+esc(gym(S.gymId).name)+'</h2>'+
        (total ? '<span class="kicker">'+total+' set'+(total===1?'':'s')+' logged</span>' : '')+
        '</div>';
      if(S.note) h += '<p class="p" style="padding:10px;background:var(--surface-warm);border-radius:9px;border-left:2px solid var(--amber)">'+esc(S.note)+'</p>';
      h += S.groups.map(function(g){
        return '<div class="eqgroup"><h3>'+esc(g.equipment)+'</h3>'+
          (g.exercises||[]).map(function(ex){ return exCard(ex, g.equipment); }).join('')+'</div>';
      }).join('');

      // Finishing and favouriting only mean anything once you've actually lifted.
      if(total){
        h += '<div style="display:flex;gap:8px;margin-top:4px">'+
          '<button class="btn btn-primary" onclick="finishWorkout()"'+(S.busy?' disabled':'')+'>'+
            (S.busy?'Logging…':'Finish workout')+'</button>'+
          '<button class="btn btn-ghost" onclick="saveFavorite()"'+(S.busy?' disabled':'')+'>★ Save</button>'+
          '</div>';
      }
      h += '</section>';
      h += '<p class="fine">Sets save as you go. <b>Finish workout</b> posts it to your Workout Log; <b>Save</b> keeps it as a favourite you can do at any gym with the kit for it.</p>';
    }

    h += historyCard();

    app.innerHTML = h;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  (async function(){
    // requireProfile, not requireUser: finishing a workout posts a row to `runs`,
    // which is keyed by athlete_id, so we need the profile as well as the login.
    var p = await requireProfile(); if(!p) return;
    var s = await sb.auth.getSession();
    S.userId = s.data.session.user.id;
    S.athleteId = p.row ? p.row.id : null;

    await loadGyms();
    await loadKit();
    await loadFavs();
    await loadHistory();
    S.loaded = true;
    render();
    matchFavs();
  })();
  </script>
</body>
</html>
