<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tally — Training Log</title>
  <meta name="theme-color" content="#3A5A40">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tally">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bone:#F4F1E9; --paper:#FFFFFF; --surface-warm:#FBF9F3; --ink:#1E241C;
      --muted:#71776B; --green:#3A5A40; --green-deep:#2C4530; --amber:#BE722A;
      --silver:#E2DCCF; --green-tint:#EBF0E8; --danger:#A8443A;
      /* Chart marks. The UI green (#3A5A40) reads as gray as a data mark — its
         chroma is below the floor — so plotted runs use a lifted sibling in the
         same hue. Validated: 5.75:1 on card, normal-vision ΔE 20.5 vs amber. */
      --mark:#33733A; --mark-accent:#BE722A; --mark-off:#8A8F84;
      --f-display:'Space Grotesk',system-ui,sans-serif;
      --f-body:'Inter',system-ui,sans-serif;
      --f-mono:'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;font-family:var(--f-body);background:var(--bone);color:var(--ink);min-height:100vh;}
    button:focus-visible,a:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

    .topbar{background:var(--green-deep);color:var(--paper);padding:.85rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid var(--amber);}
    .brand{display:flex;align-items:baseline;gap:.5rem;text-decoration:none;color:inherit;}
    .brand .back{font-size:1.35rem;font-weight:700;line-height:1;color:var(--amber);}
    .brand .name{font-family:var(--f-display);font-weight:700;font-size:1.1rem;}
    .brand .division{font-size:.7rem;color:var(--amber);letter-spacing:2px;text-transform:uppercase;}

    main{max-width:660px;margin:0 auto;padding:1.5rem 1rem 3rem;}
    .page-title{font-family:var(--f-display);font-size:1.5rem;font-weight:600;color:var(--green-deep);margin:0 0 .2rem;}
    .page-sub{color:var(--muted);font-size:.92rem;margin:0 0 1.2rem;}

    .pills{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem;}
    .pill{font-family:var(--f-body);font-size:.8rem;font-weight:600;padding:.45rem .75rem;border-radius:8px;
          border:1px solid var(--silver);background:var(--paper);color:var(--muted);cursor:pointer;}
    .pill.active{background:var(--green);border-color:var(--green);color:#fff;}

    .card{background:var(--paper);border:1px solid var(--silver);border-radius:14px;padding:1.1rem;margin-bottom:1rem;}
    .card h2{font-family:var(--f-display);font-size:1rem;margin:0 0 .15rem;color:var(--green-deep);}
    .card .hint{font-size:.78rem;color:var(--muted);margin:0 0 .9rem;line-height:1.5;}

    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;margin-bottom:1rem;}
    @media(min-width:520px){.stats{grid-template-columns:repeat(4,1fr);}}
    .stat{background:var(--paper);border:1px solid var(--silver);border-radius:12px;padding:.7rem .8rem;}
    .stat .label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:var(--f-mono);}
    .stat .value{font-family:var(--f-display);font-size:1.4rem;font-weight:600;line-height:1.2;margin-top:.15rem;}
    .stat .value .unit{font-size:.7rem;color:var(--muted);font-weight:500;margin-left:2px;}
    .stat .delta{font-size:.72rem;font-weight:600;margin-top:.1rem;}

    /* Calendar grid — 7 day columns + a week total */
    .grid{display:grid;grid-template-columns:2.6rem repeat(7,1fr) 3.4rem;gap:2px;align-items:center;}
    .grid .dow{font-family:var(--f-mono);font-size:.62rem;color:var(--muted);text-align:center;padding-bottom:.2rem;}
    .grid .wk{font-family:var(--f-mono);font-size:.62rem;color:var(--muted);}
    .grid .tot{font-family:var(--f-mono);font-size:.72rem;font-weight:600;text-align:right;}
    .cell{height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
    .cell.rest{background:var(--surface-warm);}
    .dot{border-radius:50%;background:var(--mark);cursor:default;}
    .dot.quality{box-shadow:0 0 0 2px var(--paper),0 0 0 3.5px var(--mark-accent);}
    .dot.off{background:var(--mark-off);}

    .legend{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.8rem;font-size:.74rem;color:var(--muted);align-items:center;}
    .legend span{display:flex;align-items:center;gap:.35rem;}
    .key{width:11px;height:11px;border-radius:50%;background:var(--mark);display:inline-block;}
    .key.q{box-shadow:0 0 0 1.5px var(--paper),0 0 0 3px var(--mark-accent);}
    .key.off{background:var(--mark-off);}
    .key.line{width:14px;height:3px;border-radius:2px;background:var(--mark-accent);}

    /* Bar charts are HTML, not SVG, so axis text keeps its real size at every
       width. An SVG viewBox scales its text with the card — at phone width a
       9.5px label renders around 5px. Only the trend line is SVG, and it uses
       non-scaling-stroke so the 2px weight survives the non-uniform scale. */
    .bars{margin-top:.3rem;}
    .bars-plot{position:relative;height:170px;padding-left:30px;display:flex;align-items:flex-end;gap:2px;}
    .gl{position:absolute;left:30px;right:0;border-top:1px solid #EDE8DC;}
    .gl b{position:absolute;left:-30px;top:-.55em;width:26px;text-align:right;font-family:var(--f-mono);
          font-size:.62rem;font-weight:400;color:var(--muted);}
    .bcol{flex:1;min-width:0;height:100%;display:flex;align-items:flex-end;justify-content:center;position:relative;z-index:2;}
    .bcol i{display:block;width:100%;max-width:24px;background:var(--mark);border-radius:4px 4px 0 0;}
    .bcol i.partial{background:#B9CDB6;}
    .trend{position:absolute;left:30px;top:0;right:0;bottom:0;width:calc(100% - 30px);height:100%;z-index:3;pointer-events:none;}
    .blabels{display:flex;gap:2px;padding-left:30px;margin-top:.3rem;}
    /* Only every nth column carries a label, so a label is free to overflow its
       own 13px column into the empty ones beside it. Clipping it instead would
       crop the date to "Jan 1" — worse than no label at all. The end labels
       align inward so they can't spill outside the card. */
    .blabels{overflow:visible;}
    .blabels span{flex:1;min-width:0;text-align:center;font-family:var(--f-mono);font-size:.6rem;color:var(--muted);
                  white-space:nowrap;overflow:visible;}
    .blabels span:first-child{text-align:left;}
    .blabels span:last-child{text-align:right;}
    /* Fitness chart: HTML gridlines + labels, SVG only for the line geometry,
       and HTML dots so a measured point stays a circle under the stretched
       viewBox. Same reasoning as the bar charts above. */
    .fit-plot{position:relative;height:180px;margin-left:30px;}
    .fit-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
    .fit-dot{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--mark-accent);
             box-shadow:0 0 0 2px var(--paper);transform:translate(-50%,50%);z-index:3;}
    .fit .gl{left:0;}
    .empty{color:var(--muted);font-size:.88rem;padding:1.2rem 0;text-align:center;line-height:1.6;}
    .tip{position:fixed;display:none;pointer-events:none;background:var(--green-deep);color:#fff;
         padding:.4rem .6rem;border-radius:8px;font-size:.72rem;font-family:var(--f-mono);line-height:1.5;
         white-space:nowrap;z-index:200;box-shadow:0 4px 14px rgba(44,69,48,.28);}
    table.tbl{width:100%;border-collapse:collapse;font-size:.78rem;font-variant-numeric:tabular-nums;}
    table.tbl th{text-align:right;padding:.35rem .3rem;border-bottom:1px solid var(--silver);font-family:var(--f-mono);
                 font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
    table.tbl th:first-child,table.tbl td:first-child{text-align:left;}
    table.tbl td{text-align:right;padding:.35rem .3rem;border-bottom:1px solid var(--silver);}
    .toggle{background:none;border:none;color:var(--green);font-size:.76rem;font-weight:600;cursor:pointer;padding:0;font-family:var(--f-body);}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="home.html" class="brand">
      <span class="back" aria-hidden="true">‹</span>
      <span class="name">Tally</span>
      <span class="division">Training</span>
    </a>
  </div>

  <main>
    <h1 class="page-title">Training log</h1>
    <p class="page-sub">Every run, by day, week and month.</p>

    <div class="pills" id="range-pills" role="tablist" aria-label="Time range"></div>
    <div class="stats" id="stats"></div>
    <div id="views"></div>
  </main>
  <div class="tip" id="tip"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
  // ── State ──────────────────────────────────────────────────────────────────
  var athlete = null;
  var RUNS = [];                 // every activity, ascending by date
  var range = 26;                // weeks shown; 0 = everything
  var showTable = false;
  var RANGES = [[12,'12 weeks'],[26,'6 months'],[52,'1 year'],[0,'All time']];
  // Sub-types that mean "hard day". Everything else is base mileage.
  var QUALITY = {tempo:1, intervals:1, race:1, workout:1};

  // ── Date helpers (all local; run_date is a plain YYYY-MM-DD) ───────────────
  function parseDay(iso){ var p=iso.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function key(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function mondayOf(d){ var x=new Date(d); x.setDate(x.getDate()-((x.getDay()+6)%7)); x.setHours(0,0,0,0); return x; }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function shortDate(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
  function monthLabel(mk){ var p=mk.split('-').map(Number); return new Date(p[0],p[1]-1,1).toLocaleDateString('en-US',{month:'short'}); }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function miles(v){ return (Math.round(v*10)/10).toFixed(1); }
  function hhmm(sec){ var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h?(h+'h '+m+'m'):(m+'m'); }
  function paceOf(mi,sec){ if(!(mi>0)||!(sec>0)) return null; var p=sec/mi; return Math.floor(p/60)+':'+String(Math.round(p%60)).padStart(2,'0'); }

  // ── Shape the data ─────────────────────────────────────────────────────────
  function isRun(r){ return (r.activity_type||'run')==='run'; }
  function distOf(r){ return Number(r.distance_miles)||0; }

  // Weeks, oldest → newest, covering the selected range (or all history).
  function buildWeeks(){
    if(!RUNS.length) return [];
    var lastMon = mondayOf(new Date());
    var firstMon = mondayOf(parseDay(RUNS[0].run_date));
    if(range>0){
      var limit = addDays(lastMon, -7*(range-1));
      if(limit > firstMon) firstMon = limit;
    }
    var byDay = {};
    RUNS.forEach(function(r){ (byDay[r.run_date]=byDay[r.run_date]||[]).push(r); });

    var weeks = [];
    for(var m=new Date(firstMon); m<=lastMon; m=addDays(m,7)){
      var days = [];
      for(var i=0;i<7;i++){
        var d = addDays(m,i), k = key(d), acts = byDay[k]||[];
        days.push({ date:d, key:k, acts:acts,
          miles:acts.filter(isRun).reduce(function(s,r){return s+distOf(r);},0),
          secs:acts.filter(isRun).reduce(function(s,r){return s+(Number(r.duration_seconds)||0);},0),
          future:(d > new Date()) });
      }
      weeks.push({ monday:new Date(m), days:days,
        miles:days.reduce(function(s,x){return s+x.miles;},0),
        secs:days.reduce(function(s,x){return s+x.secs;},0),
        runs:days.reduce(function(s,x){return s+x.acts.filter(isRun).length;},0) });
    }
    return weeks;
  }

  function buildMonths(weeks){
    if(!weeks.length) return [];
    var from = weeks[0].monday, map = {}, order = [];
    RUNS.forEach(function(r){
      var d = parseDay(r.run_date); if(d < from || !isRun(r)) return;
      var mk = monthKey(d);
      if(!map[mk]){ map[mk] = {key:mk, miles:0, secs:0, runs:0}; order.push(mk); }
      map[mk].miles += distOf(r); map[mk].secs += Number(r.duration_seconds)||0; map[mk].runs++;
    });
    return order.sort().map(function(k){ return map[k]; });
  }

  // ── Stat tiles ─────────────────────────────────────────────────────────────
  function deltaHTML(now, prev){
    if(!(prev>0)) return '';
    var pct = Math.round(((now-prev)/prev)*100);
    if(pct===0) return '<div class="delta" style="color:var(--muted)">same as last</div>';
    var up = pct>0;
    return '<div class="delta" style="color:'+(up?'var(--mark)':'var(--muted)')+'">'+(up?'+':'')+pct+'% vs last</div>';
  }
  function renderStats(weeks){
    var el = document.getElementById('stats');
    if(!weeks.length){ el.innerHTML=''; return; }
    var thisWk = weeks[weeks.length-1], lastWk = weeks[weeks.length-2];
    // Trailing 4 weeks excluding the current partial one — a fairer "normal week".
    var done = weeks.slice(0,-1).slice(-4);
    var avg4 = done.length ? done.reduce(function(s,w){return s+w.miles;},0)/done.length : 0;
    var longest = 0;
    weeks.forEach(function(w){ w.days.forEach(function(d){ d.acts.filter(isRun).forEach(function(r){ longest=Math.max(longest,distOf(r)); }); }); });
    var total = weeks.reduce(function(s,w){return s+w.miles;},0);

    el.innerHTML =
      '<div class="stat"><div class="label">This week</div><div class="value">'+miles(thisWk.miles)+'<span class="unit">mi</span></div>'+(lastWk?deltaHTML(thisWk.miles,lastWk.miles):'')+'</div>'+
      '<div class="stat"><div class="label">4-week avg</div><div class="value">'+miles(avg4)+'<span class="unit">mi/wk</span></div></div>'+
      '<div class="stat"><div class="label">Longest run</div><div class="value">'+miles(longest)+'<span class="unit">mi</span></div></div>'+
      '<div class="stat"><div class="label">Range total</div><div class="value">'+miles(total)+'<span class="unit">mi</span></div></div>';
  }

  // ── Daily: the calendar grid ───────────────────────────────────────────────
  // Dot AREA is proportional to distance, so a 10-miler looks twice a 5 — a
  // radius-proportional dot would look four times bigger and overstate it.
  function dotPx(mi, maxMi){
    if(!(mi>0)) return 0;
    var minD=7, maxD=24;   // a day column is ~30px on a phone — leave it air
    var f = maxMi>0 ? Math.sqrt(mi/maxMi) : 0;
    return Math.round(minD + f*(maxD-minD));
  }
  function renderGrid(weeks){
    if(!weeks.length) return '<div class="card"><div class="empty">No activities yet.</div></div>';
    var maxDay = 0;
    weeks.forEach(function(w){ w.days.forEach(function(d){ maxDay=Math.max(maxDay,d.miles); }); });

    var h = '<div class="card"><h2>Daily</h2><p class="hint">One dot per day, sized by distance. Newest week last.</p><div class="grid">';
    h += '<div></div>' + ['M','T','W','T','F','S','S'].map(function(d){ return '<div class="dow">'+d+'</div>'; }).join('') + '<div></div>';

    weeks.forEach(function(w){
      h += '<div class="wk">'+shortDate(w.monday)+'</div>';
      w.days.forEach(function(d){
        var runs = d.acts.filter(isRun), others = d.acts.filter(function(r){return !isRun(r);});
        if(!d.acts.length){ h += '<div class="cell'+(d.future?'':' rest')+'"></div>'; return; }
        if(!runs.length){
          // Non-run day (a lift, a ride) — present, but not part of mileage.
          h += '<div class="cell" data-tip="'+esc(shortDate(d.date)+' · '+others.map(function(r){return r.activity_type;}).join(', '))+'">'+
               '<span class="dot off" style="width:8px;height:8px"></span></div>';
          return;
        }
        var px = dotPx(d.miles, maxDay);
        var quality = runs.some(function(r){ return QUALITY[r.sub_type]; });
        var tip = shortDate(d.date)+' · '+miles(d.miles)+' mi'+(d.secs?(' · '+hhmm(d.secs)):'')+
                  (paceOf(d.miles,d.secs)?(' · '+paceOf(d.miles,d.secs)+'/mi'):'')+
                  (runs.length>1?(' · '+runs.length+' runs'):'');
        h += '<div class="cell" data-tip="'+esc(tip)+'"><span class="dot'+(quality?' quality':'')+'" style="width:'+px+'px;height:'+px+'px"></span></div>';
      });
      h += '<div class="tot">'+(w.miles>0?miles(w.miles):'—')+'</div>';
    });
    h += '</div><div class="legend">'+
      '<span><i class="key"></i>Run</span>'+
      '<span><i class="key q"></i>Quality (tempo, intervals, race)</span>'+
      '<span><i class="key off"></i>Other activity</span>'+
      '<span style="color:var(--muted)">dot size = distance</span></div></div>';
    return h;
  }

  // ── A small bar chart, reused by the weekly and monthly views ──────────────
  // One series (bars) plus an optional trend line, so the legend only appears
  // when there really are two things to tell apart.
  function barChart(items, opts){
    var n = items.length; if(!n) return '';
    var max = Math.max.apply(null, items.map(function(x){return x.value;})
      .concat(opts.trend ? items.map(function(x){return x.trend||0;}) : []));
    if(max<=0) max = 1;
    var top = max*1.08;                                   // headroom above the tallest bar
    var step = max>320 ? 100 : max>150 ? 50 : max>80 ? 20 : max>40 ? 10 : max>16 ? 5 : max>8 ? 2 : 1;

    var h = '<div class="bars" role="img" aria-label="'+esc(opts.aria||'')+'"><div class="bars-plot">';
    for(var g=0; g<=top; g+=step){
      h += '<div class="gl" style="bottom:'+((g/top)*100).toFixed(2)+'%"><b>'+g+'</b></div>';
    }
    if(opts.trend){
      // viewBox is a 0–100 unit square stretched to the plot; non-scaling-stroke
      // keeps the line 2px however far it stretches.
      var pts = items.map(function(it,i){
        var x = n>1 ? (i+0.5)/n*100 : 50;
        return x.toFixed(2)+','+(100-((it.trend||0)/top)*100).toFixed(2);
      }).join(' ');
      h += '<svg class="trend" viewBox="0 0 100 100" preserveAspectRatio="none">'+
           '<polyline points="'+pts+'" fill="none" stroke="#BE722A" stroke-width="2" '+
           'vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/></svg>';
    }
    items.forEach(function(it){
      var pct = (it.value/top)*100;
      h += '<div class="bcol" data-tip="'+esc(it.tip)+'">'+
           (it.value>0 ? '<i class="'+(it.partial?'partial':'')+'" style="height:'+pct.toFixed(2)+'%"></i>' : '')+
           '</div>';
    });
    h += '</div><div class="blabels">';
    // Sparse x labels — every nth plus the last, so they never collide.
    var every = Math.ceil(n/6);
    items.forEach(function(it,i){
      h += '<span>'+((i%every===0 || i===n-1) ? esc(it.label) : '')+'</span>';
    });
    return h+'</div></div>';
  }

  function renderWeekly(weeks){
    if(weeks.length<2) return '';
    var items = weeks.map(function(w,i){
      var win = weeks.slice(Math.max(0,i-3), i+1);
      var trend = win.reduce(function(s,x){return s+x.miles;},0)/win.length;
      var partial = (i===weeks.length-1);
      return { value:w.miles, trend:trend, partial:partial, label:shortDate(w.monday),
               tip:'Week of '+shortDate(w.monday)+' · '+miles(w.miles)+' mi'+(w.secs?(' · '+hhmm(w.secs)):'')+
                   ' · '+w.runs+' run'+(w.runs===1?'':'s')+(partial?' (in progress)':'') };
    });
    return '<div class="card"><h2>Weekly</h2><p class="hint">Mileage per Mon–Sun week. The line is a 4-week rolling average — the trend under the week-to-week noise.</p>'+
      barChart(items,{trend:true, aria:'Weekly running mileage with a four week rolling average'})+
      '<div class="legend"><span><i class="key" style="border-radius:2px;width:12px;height:10px;box-shadow:none"></i>Week total</span>'+
      '<span><i class="key line"></i>4-week average</span>'+
      '<span style="color:var(--muted)">pale bar = week in progress</span></div></div>';
  }

  function renderMonthly(weeks){
    var months = buildMonths(weeks);
    if(months.length<2) return '';
    var thisMk = monthKey(new Date());
    var items = months.map(function(m){
      return { value:m.miles, partial:(m.key===thisMk), label:monthLabel(m.key),
               tip:m.key+' · '+miles(m.miles)+' mi'+(m.secs?(' · '+hhmm(m.secs)):'')+' · '+m.runs+' runs'+(m.key===thisMk?' (in progress)':'') };
    });
    return '<div class="card"><h2>Monthly</h2><p class="hint">Total miles per calendar month.</p>'+
      barChart(items,{aria:'Monthly running mileage'})+
      '<div class="row" style="display:flex;justify-content:space-between;align-items:center;margin-top:.7rem">'+
        '<span style="font-size:.74rem;color:var(--muted)">pale bar = month in progress</span>'+
        '<button class="toggle" id="tbl-toggle">'+(showTable?'hide table':'show table')+'</button></div>'+
      (showTable?monthTable(months):'')+'</div>';
  }
  function monthTable(months){
    return '<table class="tbl" style="margin-top:.7rem"><thead><tr><th>Month</th><th>Runs</th><th>Miles</th><th>Time</th><th>Pace</th></tr></thead><tbody>'+
      months.slice().reverse().map(function(m){
        return '<tr><td>'+m.key+'</td><td>'+m.runs+'</td><td>'+miles(m.miles)+'</td><td>'+(m.secs?hhmm(m.secs):'—')+'</td><td>'+(paceOf(m.miles,m.secs)||'—')+'</td></tr>';
      }).join('')+'</tbody></table>';
  }

  // ── Aerobic fitness ────────────────────────────────────────────────────────
  // Three sources, deliberately not averaged together — they measure different
  // things and disagreeing is informative:
  //
  //   · VDOT     — Daniels & Gilbert, from efforts you actually ran. Needs only
  //                distance and time, so it reaches the whole history.
  //   · Oura     — the walking test. Sparse, but the only MEASURED value here,
  //                so it's what tells you where the formula lines really sit.
  //   · Est.     — 15.3 × HRmax/HRrest (Uth 2004). Daily and smooth, but it is
  //                largely resting HR re-expressed, and Oura's sleeping low
  //                runs under a clinical resting HR, so it reads high.
  //
  // None of these will match Garmin's number — theirs is proprietary Firstbeat.
  // Consistency over time is the point, not agreement on the absolute value.
  var FIT = { runs:[], maxHR:[], oura:[], loaded:false };
  var showEst = false;
  var MI_5K = 3.106856, MI_10K = 6.213712, MI_HALF = 13.109375;

  // Daniels & Gilbert. VO2 at the velocity run, divided by the fraction of
  // VO2max sustainable for that duration.
  function vdotFor(miles, seconds){
    var t = seconds/60;
    if(!(miles>0) || !(t>0)) return null;
    // Only meaningful over race-like durations. Below ~5 min the model runs off
    // its calibration. The upper bound is 4 h so marathons still score — past
    // that, fuelling rather than aerobic capacity is what's being measured.
    // A long effort tends to under-read anyway, and since the series takes the
    // best effort in the window, an under-reading one simply never wins.
    if(t < 5 || t > 240) return null;
    var v = (miles*1609.344)/t;                       // metres per minute
    var vo2 = -4.60 + 0.182258*v + 0.000104*v*v;
    var pct = 0.8 + 0.1894393*Math.exp(-0.012778*t) + 0.2989558*Math.exp(-0.1932605*t);
    if(!(pct>0) || !(vo2>0)) return null;
    var out = vo2/pct;
    return (out>20 && out<95) ? out : null;           // outside this, the input was junk
  }

  // Fastest time to cover targetMiles anywhere inside a run's sample stream.
  // The end of the window is interpolated between samples; the start is not,
  // which biases results very slightly slow (~150 samples per run).
  function bestEffort(samples, targetMiles){
    var n = samples.length, best = null, j = 1;
    if(n < 2 || samples[n-1].mi - samples[0].mi < targetMiles) return null;
    for(var i=0; i<n-1; i++){
      if(j < i+1) j = i+1;
      while(j < n && (samples[j].mi - samples[i].mi) < targetMiles) j++;
      if(j >= n) break;                                // no window left this long
      var a = samples[j-1], b = samples[j];
      var need = samples[i].mi + targetMiles;
      var span = b.mi - a.mi;
      var tEnd = span > 0 ? a.t + ((need - a.mi)/span)*(b.t - a.t) : b.t;
      var dur = tEnd - samples[i].t;
      if(dur > 0 && (best === null || dur < best)) best = dur;
    }
    return best;
  }

  // The best VDOT a single run demonstrates, over any of the standard distances
  // (plus the whole run, when it was a race).
  function runVdot(r){
    var best = null, from = null;
    if(r.sub_type === 'race'){
      var v = vdotFor(Number(r.distance_miles)||0, Number(r.duration_seconds)||0);
      if(v!=null){ best = v; from = 'race'; }
    }
    var s = r.samples;
    if(Array.isArray(s) && s.length > 5){
      var pts = s.filter(function(p){ return p && p.mi!=null && p.t!=null; })
                 .map(function(p){ return {t:Number(p.t), mi:Number(p.mi)}; })
                 .filter(function(p){ return isFinite(p.t) && isFinite(p.mi); });
      [[MI_5K,'5K'],[MI_10K,'10K'],[MI_HALF,'half']].forEach(function(d){
        var sec = bestEffort(pts, d[0]);
        var vv = sec!=null ? vdotFor(d[0], sec) : null;
        if(vv!=null && (best===null || vv>best)){ best = vv; from = d[1]; }
      });
    }
    return best==null ? null : {vdot:best, from:from, date:r.run_date};
  }

  // Max HR in effect on a given day — the latest reading dated on or before it.
  function maxHrOn(day){
    var v = null;
    FIT.maxHR.forEach(function(m){ if(m.day <= day) v = m.value; });
    return v;
  }

  // Rolling best over a trailing window: fitness you have demonstrated lately.
  // A plain running max would never come down; this decays if you stop proving it.
  var VDOT_WINDOW = 42;
  function fitnessSeries(weeks){
    if(!weeks.length) return null;
    var from = key(weeks[0].monday), to = key(new Date());
    var efforts = [];
    FIT.runs.forEach(function(r){ var e = runVdot(r); if(e) efforts.push(e); });
    efforts.sort(function(a,b){ return a.date<b.date?-1:1; });

    var ouraBy = {}; FIT.oura.forEach(function(o){ if(o.vo2_max!=null) ouraBy[o.day]=Number(o.vo2_max); });
    var restBy = {}; FIT.oura.forEach(function(o){ if(o.resting_hr!=null) restBy[o.day]=Number(o.resting_hr); });

    var pts = [], guard = 0;
    for(var d=from; d<=to && guard<1500; d=dayAdd(d,1), guard++){
      var cut = dayAdd(d, -VDOT_WINDOW);
      var win = efforts.filter(function(e){ return e.date>cut && e.date<=d; });
      var bestV = win.length ? Math.max.apply(null, win.map(function(e){return e.vdot;})) : null;
      var mh = maxHrOn(d), rh = restBy[d];
      pts.push({ day:d, vdot:bestV,
                 oura:(ouraBy[d]!=null?ouraBy[d]:null),
                 estRaw:(mh && rh) ? (15.3*(mh/rh)) : null });
    }

    // Resting HR moves a few bpm night to night and the ratio amplifies it, so
    // the raw daily estimate is a hairball that buries the other series. Smooth
    // it over a week — a day-to-day VO2 max reading is noise either way, and
    // the trend is the only part that means anything.
    pts.forEach(function(p,i){
      var s=0, c=0;
      for(var j=Math.max(0,i-3); j<=Math.min(pts.length-1,i+3); j++){
        if(pts[j].estRaw!=null){ s+=pts[j].estRaw; c++; }
      }
      p.est = c ? (s/c) : null;
    });
    var any = pts.some(function(p){ return p.vdot!=null || p.oura!=null || p.est!=null; });
    return any ? {pts:pts, efforts:efforts} : null;
  }
  // Key-in, key-out day arithmetic (addDays() above works on Date objects).
  function dayAdd(k,n){ var p=k.split('-').map(Number); var d=new Date(p[0],p[1]-1,p[2]); d.setDate(d.getDate()+n); return key(d); }

  // Same HTML-text / SVG-geometry split as the bar charts: axis labels stay at
  // their real size at any width, and the dots stay circular because they're
  // HTML, not marks inside a non-uniformly scaled viewBox.
  function fitnessChart(F){
    var pts = F.pts, n = pts.length;
    var vals = [];
    pts.forEach(function(p){ [p.vdot,p.oura,showEst?p.est:null].forEach(function(v){ if(v!=null) vals.push(v); }); });
    if(!vals.length) return '';
    var lo = Math.min.apply(null,vals), hi = Math.max.apply(null,vals);
    if(hi-lo < 4){ var mid=(hi+lo)/2; lo=mid-2; hi=mid+2; }
    var pad=(hi-lo)*0.15; lo-=pad; hi+=pad;
    var X = function(i){ return n>1 ? (i/(n-1))*100 : 50; };
    var Y = function(v){ return 100 - ((v-lo)/(hi-lo))*100; };

    var step = (hi-lo)>30 ? 10 : (hi-lo)>12 ? 5 : (hi-lo)>6 ? 2 : 1;
    var h = '<div class="fit"><div class="fit-plot">';
    for(var g=Math.ceil(lo/step)*step; g<=hi; g+=step){
      h += '<div class="gl" style="bottom:'+(100-Y(g)).toFixed(2)+'%"><b>'+g+'</b></div>';
    }
    h += '<svg class="fit-svg" viewBox="0 0 100 100" preserveAspectRatio="none">';
    [['vdot','#33733A',2],['est','#009B8C',1.5]].forEach(function(s){
      if(s[0]==='est' && !showEst) return;
      // Break the path wherever the series has no value, rather than bridging a
      // gap with a straight line that implies data we don't have.
      var d='', pen=false;
      pts.forEach(function(p,i){
        var v=p[s[0]];
        if(v==null){ pen=false; return; }
        d += (pen?'L':'M')+X(i).toFixed(2)+' '+Y(v).toFixed(2)+' '; pen=true;
      });
      if(d) h += '<path d="'+d+'" fill="none" stroke="'+s[1]+'" stroke-width="'+s[2]+'" '+
                 'vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>';
    });
    h += '</svg>';
    pts.forEach(function(p,i){
      if(p.oura==null) return;
      h += '<span class="fit-dot" style="left:'+X(i).toFixed(2)+'%;bottom:'+(100-Y(p.oura)).toFixed(2)+'%" '+
           'data-tip="'+esc('Oura test · '+p.oura.toFixed(1)+' · '+p.day)+'"></span>';
    });
    h += '</div><div class="blabels" style="padding-left:30px">';
    var every = Math.ceil(n/5);
    pts.forEach(function(p,i){
      h += '<span>'+((i%every===0||i===n-1) ? esc(shortDate(parseDay(p.day))) : '')+'</span>';
    });
    return h+'</div></div>';
  }

  function renderFitness(weeks){
    if(!FIT.loaded) return '<div class="card"><h2>Aerobic fitness</h2><div class="empty">Loading…</div></div>';
    var F = fitnessSeries(weeks);
    var h = '<div class="card"><h2>Aerobic fitness</h2>';
    if(!F){
      return h+'<p class="hint" style="margin:0">Nothing to plot yet. This needs either a race, a run with a heart-rate/pace stream long enough to hold a 5K, or a max HR in <a href="vitals.html" style="color:var(--green);font-weight:600">Vitals</a> alongside Oura resting HR.</p></div>';
    }
    var last = F.pts[F.pts.length-1];
    var firstV = null, lastV = null;
    F.pts.forEach(function(p){ if(p.vdot!=null){ if(firstV===null) firstV=p.vdot; lastV=p.vdot; } });
    var ouraPts = F.pts.filter(function(p){ return p.oura!=null; });
    var lastOura = ouraPts.length ? ouraPts[ouraPts.length-1] : null;

    h += '<p class="hint">VDOT from efforts you actually ran, anchored by Oura\'s walking test. Absolute values won\'t match Garmin — the trend is the point.</p>';
    h += '<div class="stats" style="margin-bottom:.8rem">'+
      '<div class="stat"><div class="label">VDOT now</div><div class="value">'+(lastV!=null?lastV.toFixed(1):'—')+'</div>'+
        (firstV!=null&&lastV!=null&&Math.abs(lastV-firstV)>=0.05
          ? '<div class="delta" style="color:'+(lastV>=firstV?'var(--mark)':'var(--muted)')+'">'+(lastV>firstV?'+':'')+(lastV-firstV).toFixed(1)+' over range</div>' : '')+'</div>'+
      '<div class="stat"><div class="label">Oura test</div><div class="value">'+(lastOura?lastOura.oura.toFixed(1):'—')+'</div>'+
        (lastOura?'<div class="delta" style="color:var(--muted)">'+shortDate(parseDay(lastOura.day))+'</div>':'')+'</div>'+
      '</div>';
    h += fitnessChart(F);
    h += '<div class="legend">'+
      '<span><i class="key"></i>VDOT (best effort, 6 wk)</span>'+
      '<span><i class="key" style="background:var(--mark-accent)"></i>Oura test</span>'+
      (showEst?'<span><i class="key" style="background:#009B8C"></i>HRmax ÷ resting HR (7-day avg)</span>':'')+
      '</div>';
    // The calibration read. Two estimates of the same quantity sitting a steady
    // distance apart is expected — one is a walk test, the other a run
    // performance — and knowing the size of the gap is what makes either
    // number usable. A gap that WANDERS is the interesting case: it means the
    // two disagree about the direction you're moving.
    var both = F.pts.filter(function(p){ return p.oura!=null && p.vdot!=null; });
    if(both.length >= 2){
      var diffs = both.map(function(p){ return p.oura - p.vdot; });
      var mean = diffs.reduce(function(s,x){return s+x;},0)/diffs.length;
      var spread = Math.max.apply(null,diffs) - Math.min.apply(null,diffs);
      h += '<p class="hint" style="margin:.6rem 0 0">Across '+both.length+' tests, Oura reads '+
        (mean>=0?'+':'−')+Math.abs(mean).toFixed(1)+' vs VDOT'+
        (spread<=3 ? ', and holds that gap steadily — the two agree on direction, just not on the zero point.'
                   : ' but the gap swings by '+spread.toFixed(1)+', so they disagree about which way you\'re trending.')+'</p>';
    }
    h += '<div class="row" style="display:flex;justify-content:space-between;align-items:center;margin-top:.7rem">'+
      '<span style="font-size:.72rem;color:var(--muted)">'+F.efforts.length+' qualifying effort'+(F.efforts.length===1?'':'s')+'</span>'+
      '<button class="toggle" id="est-toggle">'+(showEst?'hide daily estimate':'show daily estimate')+'</button></div>';
    if(showEst) h += '<p class="hint" style="margin:.5rem 0 0">The daily line is 15.3 × (max HR ÷ resting HR). It moves with recovery, not performance, and reads high because Oura\'s resting HR is a sleeping low.</p>';
    return h+'</div>';
  }

  async function loadFitness(){
    var q = await sb.from('runs')
      .select('run_date, sub_type, distance_miles, duration_seconds, samples')
      .eq('athlete_id', athlete.id)
      .or('samples.not.is.null,sub_type.eq.race')
      .order('run_date',{ascending:true});
    FIT.runs = q.data || [];
    var v = await sb.from('vitals').select('measured_on,value').eq('kind','max_hr').order('measured_on',{ascending:true});
    FIT.maxHR = (v.data||[]).map(function(x){ return {day:x.measured_on, value:Number(x.value)}; }).filter(function(x){ return x.value>0; });
    var o = await sb.from('oura_daily').select('day,vo2_max,resting_hr').order('day',{ascending:true});
    FIT.oura = o.data || [];
    FIT.loaded = true;
    render();
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderPills(){
    document.getElementById('range-pills').innerHTML = RANGES.map(function(r){
      return '<button class="pill'+(range===r[0]?' active':'')+'" data-w="'+r[0]+'" role="tab">'+r[1]+'</button>';
    }).join('');
    document.querySelectorAll('#range-pills .pill').forEach(function(b){
      b.addEventListener('click', function(){ range = Number(b.dataset.w); render(); });
    });
  }
  function render(){
    renderPills();
    var weeks = buildWeeks();
    renderStats(weeks);
    document.getElementById('views').innerHTML = RUNS.length
      ? (renderGrid(weeks) + renderWeekly(weeks) + renderMonthly(weeks) + renderFitness(weeks))
      : '<div class="card"><div class="empty">No activities logged yet.<br>Once runs are in, this fills up on its own.</div></div>';
    var t = document.getElementById('tbl-toggle');
    if(t) t.addEventListener('click', function(){ showTable = !showTable; render(); });
    var e = document.getElementById('est-toggle');
    if(e) e.addEventListener('click', function(){ showEst = !showEst; render(); });
    wireTips();
  }

  // One tooltip, shared by every mark on the page.
  function wireTips(){
    var tip = document.getElementById('tip');
    document.querySelectorAll('[data-tip]').forEach(function(n){
      n.addEventListener('mouseenter', function(e){
        tip.textContent = n.getAttribute('data-tip');
        tip.style.display = 'block';
        var r = n.getBoundingClientRect();
        var tw = tip.offsetWidth;
        tip.style.left = Math.max(6, Math.min(window.innerWidth-tw-6, r.left+r.width/2-tw/2))+'px';
        tip.style.top = Math.max(6, r.top-tip.offsetHeight-8)+'px';
      });
      n.addEventListener('mouseleave', function(){ tip.style.display='none'; });
    });
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  (async function(){
    var profile = await requireProfile();
    if(!profile) return;
    athlete = profile.row;
    var r = await sb.from('runs')
      .select('run_date, activity_type, sub_type, distance_miles, duration_seconds')
      .eq('athlete_id', athlete.id)
      .order('run_date', {ascending:true});
    RUNS = (r.data||[]).filter(function(x){ return x.run_date; });
    render();
    // Sample streams are heavy, so the log paints first and the fitness card
    // fills in behind it.
    loadFitness();
  })();
  </script>
</body>
</html>
