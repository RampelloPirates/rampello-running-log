<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Detail — Tampa Bay Pirates XC</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8102e">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pirates XC">
  <style>
    :root {
      --red:      #c8102e;
      --red-dark: #a00d24;
      --black:    #1a1a1a;
      --bone:     #f9f6f0;
      --paper:    #ffffff;
      --slate:    #4a5568;
      --slate-2:  #6b7280;
      --silver:   #d1d5db;
      --silver-2: #e5e7eb;
      --green:    #1b5e20;
      --amber:    #b45309;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body:    'Helvetica Neue', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bone);
      color: var(--black);
      min-height: 100vh;
    }

    /* topbar */
    .topbar {
      background: var(--black);
      color: var(--paper);
      padding: 0.85rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid var(--red);
    }
    .brand { display: flex; align-items: baseline; gap: 0.6rem; text-decoration: none; color: inherit; }
    .brand .script { font-family: var(--font-display); font-style: italic; color: var(--red); font-size: 1rem; }
    .brand .name { font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; font-size: 1.05rem; }
    .brand .division { font-size: 0.7rem; color: var(--silver); letter-spacing: 2px; text-transform: uppercase; }

    .user-area { position: relative; }
    .menu-btn {
      background: transparent; color: var(--paper);
      border: 1px solid var(--silver-2);
      width: 38px; height: 38px;
      border-radius: 3px; cursor: pointer;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      font-family: var(--font-body); padding: 0;
    }
    .menu-btn:hover { background: var(--red); border-color: var(--red); }
    .menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--paper); color: var(--black);
      border: 1px solid var(--silver-2); border-radius: 4px;
      min-width: 220px; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: none; z-index: 50; overflow: hidden;
    }
    .menu.show { display: block; }
    .menu-user {
      padding: 0.85rem 1rem; font-size: 0.85rem;
      color: var(--slate);
      border-bottom: 1px solid var(--silver-2);
      background: var(--bone);
    }
    .menu-item {
      display: block; width: 100%; text-align: left;
      background: none; border: none;
      padding: 0.75rem 1rem; font-size: 0.9rem;
      cursor: pointer; font-family: var(--font-body);
      color: var(--black); text-decoration: none;
    }
    .menu-item:hover { background: var(--bone); }
    .menu-item.danger { color: var(--red); }

    /* main */
    main { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem 1rem; }

    .breadcrumb a {
      color: var(--slate-2);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .breadcrumb a:hover { color: var(--red); }

    .athlete-header {
      margin: 0.5rem 0 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .athlete-name {
      font-size: 1.7rem;
      font-weight: 700;
      margin: 0;
    }
    .athlete-meta {
      color: var(--slate);
      font-size: 0.9rem;
      margin: 0.3rem 0 0 0;
    }
    .athlete-meta .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      background: var(--silver-2);
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 0.4rem;
    }
    .athlete-meta .badge.inactive { background: #fde2e2; color: #b71c1c; }

    h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--slate);
      margin: 0 0 0.85rem 0;
      font-weight: 700;
    }

    /* range filter */
    .range-filter {
      display: flex; gap: 0.25rem;
      background: var(--paper);
      border: 1px solid var(--silver-2);
      padding: 3px; border-radius: 4px;
      margin-bottom: 1rem;
      width: fit-content;
    }
    .range-btn {
      background: transparent; border: none;
      padding: 0.45rem 0.85rem;
      font-size: 0.8rem; cursor: pointer;
      font-family: var(--font-body); color: var(--slate);
      border-radius: 3px;
    }
    .range-btn.active {
      background: var(--black); color: var(--paper); font-weight: 700;
    }

    /* stat tiles */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-left: 4px solid var(--red);
      padding: 1rem; border-radius: 4px;
    }
    .stat .label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--slate-2);
      margin-bottom: 0.3rem; font-weight: 700;
    }
    .stat .value { font-size: 1.6rem; font-weight: 700; color: var(--black); line-height: 1; }
    .stat .unit { font-size: 0.75rem; color: var(--slate); margin-left: 0.2rem; font-weight: 400; }

    /* panels */
    .panel {
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-radius: 4px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .panel-heading {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--silver-2);
      background: var(--bone);
    }
    .panel-heading h3 {
      margin: 0; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--slate); font-weight: 700;
    }

    .pace-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .pace-table th {
      text-align: left; padding: 0.6rem 1rem;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--slate-2);
      border-bottom: 1px solid var(--silver-2); font-weight: 700;
    }
    .pace-table th.num, .pace-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .pace-table td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--silver-2); }
    .pace-table tr:last-child td { border-bottom: none; }

    .seg-pill {
      display: inline-block; font-size: 0.7rem;
      padding: 0.2rem 0.55rem; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
      font-weight: 700; background: var(--silver-2); color: var(--slate);
    }
    .seg-warmup { background:#e3f2fd; color:#0d47a1; }
    .seg-easy   { background:#e8f5e9; color:#1b5e20; }
    .seg-tempo  { background:#fff3e0; color:#b45309; }
    .seg-threshold { background:#fff3e0; color:#a04000; }
    .seg-interval, .seg-hill { background:#ffebee; color:#b71c1c; }
    .seg-rest   { background:#ede7f6; color:#4527a0; }
    .seg-fartlek { background:#fce4ec; color:#880e4f; }
    .seg-strides { background:#e0f7fa; color:#006064; }
    .seg-cooldown { background:#e0e0e0; color:#424242; }

    /* contact panel */
    .contact-body > div {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--silver-2);
    }
    .contact-body > div:last-child { border-bottom: none; }
    .contact-body .ci-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--slate-2);
      font-weight: 700;
    }
    .contact-body .ci-val { color: var(--black); }
    .contact-body a { color: var(--red); text-decoration: none; }
    .contact-body a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .contact-body > div { grid-template-columns: 1fr; gap: 0.1rem; }
    }

    /* weekly mileage chart (simple bars) */
    .week-bars { padding: 1rem 1.25rem; }
    .week-bar-row {
      display: grid;
      grid-template-columns: 100px 1fr 60px;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
    }
    .week-bar-row .week-label {
      font-size: 0.78rem; color: var(--slate);
    }
    .week-bar-track {
      height: 14px;
      background: var(--silver-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .week-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
    }
    .week-bar-val {
      font-size: 0.8rem; font-weight: 700; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* run-list */
    .run-list { padding: 0; }
    .run-row {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--silver-2);
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 1rem; align-items: center; cursor: pointer;
    }
    .run-row:last-child { border-bottom: none; }
    .run-row:hover { background: var(--bone); }
    .run-row .date { font-size: 0.85rem; color: var(--slate); }
    .run-row .date strong { display: block; color: var(--black); font-size: 0.95rem; }
    .run-row .meta { font-size: 0.9rem; color: var(--slate); }
    .run-row .meta strong { color: var(--black); }
    .run-row .pace { font-size: 0.85rem; color: var(--slate-2); text-align: right; }
    .run-row .pace strong { display: block; color: var(--black); font-size: 0.95rem; }
    .run-segments {
      display: none;
      padding: 0.85rem 1.25rem 1.25rem 1.25rem;
      background: var(--bone);
      border-bottom: 1px solid var(--silver-2);
    }
    .run-segments.show { display: block; }
    .seg-mini-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.85rem;
      background: var(--paper);
      border: 1px solid var(--silver-2);
      border-radius: 3px; overflow: hidden;
    }
    .seg-mini-table th, .seg-mini-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--silver-2);
      text-align: left;
    }
    .seg-mini-table th {
      background: var(--bone);
      font-size: 0.65rem; text-transform: uppercase;
      color: var(--slate-2); letter-spacing: 1px; font-weight: 700;
    }
    .seg-mini-table tr:last-child td { border-bottom: none; }
    .seg-mini-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .run-notes {
      margin-top: 0.85rem;
      padding: 0.75rem 1rem;
      background: var(--paper);
      border-left: 3px solid var(--silver);
      border-radius: 0 3px 3px 0;
      font-size: 0.9rem; color: var(--slate); font-style: italic;
    }

    .empty { padding: 2.5rem 1.5rem; text-align: center; color: var(--slate-2); font-style: italic; }
    .loading { padding: 2.5rem; text-align: center; color: var(--slate-2); font-style: italic; }

    @media (max-width: 600px) {
      .run-row { grid-template-columns: 90px 1fr; }
      .run-row .pace { grid-column: 1 / -1; text-align: left; }
      .week-bar-row { grid-template-columns: 60px 1fr 60px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="team_dashboard.html" class="brand">
      <span class="script">Tampa Bay</span>
      <span class="name">Pirates</span>
      <span class="division">XC</span>
    </a>
    <div class="user-area">
      <button class="menu-btn" id="menu-btn" aria-label="Menu" aria-haspopup="true">⋯</button>
      <div class="menu" id="menu" role="menu">
        <div class="menu-user" id="user-name">…</div>
        <a class="menu-item" href="team_dashboard.html" role="menuitem">Dashboard</a>
        <a class="menu-item" href="roster.html" role="menuitem">Roster</a>
        <button class="menu-item danger" id="signout-btn" role="menuitem">Sign out</button>
      </div>
    </div>
  </div>

  <main>
    <div class="breadcrumb"><a href="roster.html">← Roster</a></div>

    <div class="athlete-header">
      <div>
        <h1 class="athlete-name" id="athlete-name">Loading…</h1>
        <p class="athlete-meta" id="athlete-meta"></p>
      </div>
    </div>

    <details class="panel" id="contact-panel" style="display:none;">
      <summary style="padding:0.85rem 1.25rem;cursor:pointer;font-size:0.8rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--slate);font-weight:700;background:var(--bone);border-bottom:1px solid var(--silver-2);">Contact &amp; background</summary>
      <div class="contact-body" id="contact-body" style="padding:1rem 1.25rem;font-size:0.9rem;"></div>
    </details>

    <div class="range-filter" role="tablist">
      <button class="range-btn active" data-range="week" role="tab">This week</button>
      <button class="range-btn" data-range="month" role="tab">This month</button>
      <button class="range-btn" data-range="year" role="tab">This year</button>
      <button class="range-btn" data-range="all" role="tab">All time</button>
    </div>
    <p id="range-sub" style="margin:0 0 1rem 0;font-size:0.8rem;color:var(--slate-2);"></p>

    <div class="stats">
      <div class="stat"><div class="label">Runs</div><div class="value" id="stat-runs">—</div></div>
      <div class="stat"><div class="label">Total miles</div><div class="value" id="stat-miles">—</div></div>
      <div class="stat"><div class="label">Total time</div><div class="value" id="stat-time">—</div></div>
      <div class="stat"><div class="label">Avg pace</div><div class="value" id="stat-pace">—</div></div>
    </div>

    <div class="panel">
      <div class="panel-heading"><h3>Weekly mileage</h3></div>
      <div class="week-bars" id="week-bars"><div class="loading">Loading…</div></div>
    </div>

    <div class="panel">
      <div class="panel-heading"><h3>Paces by segment type</h3></div>
      <div id="pace-table-wrap"><div class="loading">Loading…</div></div>
    </div>

    <div class="panel">
      <div class="panel-heading"><h3>Run history</h3></div>
      <div id="run-list-wrap" class="run-list"><div class="loading">Loading…</div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://dprmpgjgjppvdlyxlubr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwcm1wZ2pnanBwdmRseXhsdWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTI5MTgsImV4cCI6MjA5NDUyODkxOH0.lyhPhWYE8EqSRAIzwn0yQ36d6Ue2TZjZodZlQqfnDfI';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---- menu ----
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('show'); });
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== menuBtn) menu.classList.remove('show');
    });
    document.getElementById('signout-btn').addEventListener('click', async () => {
      if (!confirm("Sign out? You'll need to sign in again with a magic link.")) return;
      await sb.auth.signOut();
      window.location.href = 'index.html';
    });

    // ---- auth (coach only) ----
    async function requireCoach() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return null; }
      const { data: coach } = await sb
        .from('coaches')
        .select('id, first_name, last_name')
        .eq('auth_user_id', session.user.id)
        .eq('active', true)
        .maybeSingle();
      if (!coach) { window.location.href = 'log_run.html'; return null; }
      return coach;
    }

    // ---- helpers ----
    const params = new URLSearchParams(window.location.search);
    const athleteId = params.get('id');

    function pad(n) { return String(n).padStart(2, '0'); }
    function formatDuration(sec) {
      if (sec == null) return '—';
      sec = Math.round(sec);
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h) return `${h}:${pad(m)}:${pad(s)}`;
      return `${m}:${pad(s)}`;
    }
    function formatPace(secPerMile) {
      if (!secPerMile || !isFinite(secPerMile) || secPerMile <= 0) return '—';
      const m = Math.floor(secPerMile / 60);
      const s = Math.round(secPerMile % 60);
      return `${m}:${pad(s)} /mi`;
    }
    function formatMiles(m) { const n = Number(m); return (n < 10 ? n.toFixed(2) : n.toFixed(1)); }
    function formatDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function rangeStartISO(period) {
      const now = new Date();
      if (period === 'all') return '1900-01-01';
      if (period === 'week') {
        const monday = new Date(now);
        const day = monday.getDay();
        const diff = (day + 6) % 7;            // days back to Monday
        monday.setDate(monday.getDate() - diff);
        monday.setHours(0, 0, 0, 0);
        return monday.toISOString().slice(0, 10);
      }
      if (period === 'month') {
        return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
      }
      if (period === 'year') {
        return new Date(now.getFullYear(), 0, 1).toISOString().slice(0, 10);
      }
      return '1900-01-01';
    }
    function rangeLabel(period) {
      const start = rangeStartISO(period);
      if (period === 'all') return 'All runs ever logged';
      const startD = new Date(start + 'T00:00:00');
      const today = new Date();
      const fmt = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (period === 'week') return 'Week of ' + fmt(startD) + ' (Mon–Sun)';
      if (period === 'month') return startD.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      if (period === 'year') return startD.getFullYear() + ' year-to-date';
      return fmt(startD) + ' – ' + fmt(today);
    }
    function startOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day + 6) % 7;
      d.setDate(d.getDate() - diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function isoOf(d) { return d.toISOString().slice(0, 10); }
    function segMap(rt) {
      return ({ easy:'easy', long:'easy', tempo:'tempo', intervals:'interval', race:'tempo', cross_train:'rest' })[rt] || 'easy';
    }

    let activeRange = 'week';
    let athlete = null;

    async function loadAthlete() {
      if (!athleteId) {
        document.getElementById('athlete-name').textContent = 'Pick an athlete from the roster';
        return null;
      }
      const { data, error } = await sb
        .from('athletes')
        .select(`
          id, first_name, last_name, email, grade, gender, active, auth_user_id, notes,
          date_of_birth, signup_source, signup_notes,
          parent_first_name, parent_last_name, parent_email, parent_phone,
          emergency_contact_name, emergency_contact_phone
        `)
        .eq('id', athleteId)
        .maybeSingle();
      if (error || !data) {
        document.getElementById('athlete-name').textContent = 'Athlete not found';
        return null;
      }
      athlete = data;
      document.getElementById('athlete-name').textContent = data.first_name + ' ' + data.last_name;
      const metaBits = [];
      if (data.grade) metaBits.push('Grade ' + data.grade);
      if (data.email) metaBits.push(escapeHtml(data.email));
      const linked = data.auth_user_id ? '<span class="badge" style="background:#e8f5e9;color:#1b5e20">linked</span>' : '<span class="badge">pending sign-in</span>';
      const active = data.active ? '' : '<span class="badge inactive">inactive</span>';
      document.getElementById('athlete-meta').innerHTML = metaBits.join(' · ') + ' ' + linked + active;
      renderContactPanel(data);
      return data;
    }

    function calcAge(dobISO) {
      if (!dobISO) return null;
      const dob = new Date(dobISO + 'T00:00:00');
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
      return age;
    }
    function formatDOB(dobISO) {
      if (!dobISO) return null;
      const d = new Date(dobISO + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function renderContactPanel(a) {
      const panel = document.getElementById('contact-panel');
      if (!a) { panel.style.display = 'none'; return; }
      const hasParent = a.parent_first_name || a.parent_last_name || a.parent_email || a.parent_phone;
      const hasEmergency = a.emergency_contact_name || a.emergency_contact_phone;
      const hasDob = a.date_of_birth;
      const hasNotes = a.signup_notes || a.notes;
      if (!hasParent && !hasEmergency && !hasDob && !hasNotes) {
        panel.style.display = 'none';
        return;
      }
      panel.style.display = '';

      const rows = [];
      if (hasDob) {
        const age = calcAge(a.date_of_birth);
        rows.push(`<div><span class="ci-label">Born</span><span class="ci-val">${formatDOB(a.date_of_birth)}${age != null ? ` (age ${age})` : ''}</span></div>`);
      }
      if (hasParent) {
        const name = [a.parent_first_name, a.parent_last_name].filter(Boolean).join(' ');
        rows.push(`<div><span class="ci-label">Parent / Guardian</span><span class="ci-val">${escapeHtml(name || '—')}</span></div>`);
        if (a.parent_email) rows.push(`<div><span class="ci-label">Email</span><span class="ci-val"><a href="mailto:${escapeHtml(a.parent_email)}">${escapeHtml(a.parent_email)}</a></span></div>`);
        if (a.parent_phone) rows.push(`<div><span class="ci-label">Phone</span><span class="ci-val"><a href="tel:${escapeHtml(a.parent_phone)}">${escapeHtml(a.parent_phone)}</a></span></div>`);
      }
      if (hasEmergency) {
        rows.push(`<div><span class="ci-label">Emergency contact</span><span class="ci-val">${escapeHtml(a.emergency_contact_name || '—')}</span></div>`);
        if (a.emergency_contact_phone) rows.push(`<div><span class="ci-label">Emergency phone</span><span class="ci-val"><a href="tel:${escapeHtml(a.emergency_contact_phone)}">${escapeHtml(a.emergency_contact_phone)}</a></span></div>`);
      }
      if (a.signup_notes) rows.push(`<div><span class="ci-label">Signup notes</span><span class="ci-val">${escapeHtml(a.signup_notes)}</span></div>`);
      if (a.notes) rows.push(`<div><span class="ci-label">Coach notes</span><span class="ci-val">${escapeHtml(a.notes)}</span></div>`);

      document.getElementById('contact-body').innerHTML = rows.join('');
    }

    async function loadRuns() {
      const startDate = rangeStartISO(activeRange);
      document.getElementById('range-sub').textContent = rangeLabel(activeRange);
      const { data: runs } = await sb
        .from('runs')
        .select(`
          id, run_date, run_type, distance_miles, duration_seconds,
          effort_rpe, avg_cadence, avg_hr, max_hr, route, shoes,
          conditions, temperature_f, dewpoint_f, humidity_percent, wind_mph,
          cross_train_activity, notes,
          run_segments(id, segment_order, segment_type, distance_miles, duration_seconds, notes),
          race_results(meet_name, course_type, finish_place_overall, finish_place_team)
        `)
        .eq('athlete_id', athleteId)
        .gte('run_date', startDate)
        .order('run_date', { ascending: false })
        .order('created_at', { ascending: false });

      const list = runs || [];
      renderStats(list);
      renderPaceByType(list);
      renderWeeklyBars(list);
      renderRunList(list);
    }

    function renderStats(runs) {
      let totalMiles = 0, totalSec = 0;
      runs.forEach(r => {
        if (r.distance_miles) totalMiles += Number(r.distance_miles);
        if (r.duration_seconds) totalSec += Number(r.duration_seconds);
      });
      document.getElementById('stat-runs').textContent = runs.length;
      document.getElementById('stat-miles').innerHTML = totalMiles ? formatMiles(totalMiles) + '<span class="unit">mi</span>' : '—';
      document.getElementById('stat-time').textContent = totalSec ? formatDuration(totalSec) : '—';
      document.getElementById('stat-pace').textContent =
        (totalSec && totalMiles) ? formatPace(totalSec / totalMiles) : '—';
    }

    function renderPaceByType(runs) {
      const byType = {};
      runs.forEach(r => {
        (r.run_segments || []).forEach(s => {
          const t = s.segment_type;
          if (!byType[t]) byType[t] = { miles: 0, seconds: 0, count: 0 };
          if (s.distance_miles) byType[t].miles += Number(s.distance_miles);
          if (s.duration_seconds) byType[t].seconds += Number(s.duration_seconds);
          byType[t].count += 1;
        });
      });
      const order = ['warmup','easy','tempo','threshold','interval','hill','fartlek','strides','rest','cooldown'];
      const rows = order
        .filter(t => byType[t])
        .map(t => {
          const d = byType[t];
          const pace = d.miles > 0 && d.seconds > 0 ? d.seconds / d.miles : null;
          return `
            <tr>
              <td><span class="seg-pill seg-${t}">${t}</span></td>
              <td class="num">${d.miles ? formatMiles(d.miles) + ' mi' : '—'}</td>
              <td class="num">${d.seconds ? formatDuration(d.seconds) : '—'}</td>
              <td class="num"><strong>${formatPace(pace)}</strong></td>
              <td class="num" style="color:var(--slate-2)">${d.count}</td>
            </tr>
          `;
        }).join('');
      const wrap = document.getElementById('pace-table-wrap');
      if (!rows) {
        wrap.innerHTML = '<div class="empty">No segment data in this range yet.</div>';
        return;
      }
      wrap.innerHTML = `
        <table class="pace-table">
          <thead>
            <tr>
              <th>Type</th>
              <th class="num">Distance</th>
              <th class="num">Time</th>
              <th class="num">Avg pace</th>
              <th class="num"># seg</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderWeeklyBars(runs) {
      const wrap = document.getElementById('week-bars');
      if (runs.length === 0) {
        wrap.innerHTML = '<div class="empty">No runs to chart yet.</div>';
        return;
      }
      // bucket by week start
      const buckets = new Map(); // iso week start -> miles
      runs.forEach(r => {
        const wkStart = isoOf(startOfWeek(r.run_date + 'T00:00:00'));
        if (!buckets.has(wkStart)) buckets.set(wkStart, 0);
        if (r.distance_miles) buckets.set(wkStart, buckets.get(wkStart) + Number(r.distance_miles));
      });
      const sorted = [...buckets.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      const maxMi = Math.max(1, ...sorted.map(e => e[1]));
      wrap.innerHTML = sorted.map(([wk, mi]) => {
        const wkLabel = new Date(wk + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const pct = (mi / maxMi) * 100;
        return `
          <div class="week-bar-row">
            <div class="week-label">Wk of ${wkLabel}</div>
            <div class="week-bar-track"><div class="week-bar-fill" style="width:${pct}%"></div></div>
            <div class="week-bar-val">${formatMiles(mi)} mi</div>
          </div>
        `;
      }).join('');
    }

    function renderRunList(runs) {
      const wrap = document.getElementById('run-list-wrap');
      if (runs.length === 0) {
        wrap.innerHTML = '<div class="empty">No runs in this range yet.</div>';
        return;
      }
      wrap.innerHTML = runs.map(r => {
        const dist = r.distance_miles ? Number(r.distance_miles) : 0;
        const dur = r.duration_seconds ? Number(r.duration_seconds) : 0;
        const pace = (dist > 0 && dur > 0) ? dur / dist : null;
        const typeLabel = r.run_type.replace('_', ' ');
        const segs = (r.run_segments || []).sort((a, b) => (a.segment_order || 0) - (b.segment_order || 0));
        const race = r.race_results && r.race_results[0];
        return `
          <div class="run-row" data-id="${r.id}">
            <div class="date">
              <strong>${formatDate(r.run_date)}</strong>
              <span class="seg-pill seg-${segMap(r.run_type)}">${typeLabel}</span>
            </div>
            <div class="meta">
              <strong>${dist ? formatMiles(dist) + ' mi' : ''}</strong>${dist && dur ? ' · ' : ''}${dur ? formatDuration(dur) : ''}
              ${race ? '<br><span style="color:var(--slate-2);font-size:0.85rem">' + escapeHtml(race.meet_name || '') + (race.finish_place_overall ? ' · finish ' + race.finish_place_overall : '') + '</span>' : ''}
              ${r.cross_train_activity ? '<br><span style="color:var(--slate-2);font-size:0.85rem">' + escapeHtml(r.cross_train_activity) + '</span>' : ''}
            </div>
            <div class="pace">
              <strong>${formatPace(pace)}</strong>
              ${r.effort_rpe ? `<span>RPE ${r.effort_rpe}</span>` : ''}
            </div>
          </div>
          <div class="run-segments" data-segments-for="${r.id}">
            ${renderSegmentDetail(segs, r)}
          </div>
        `;
      }).join('');
      wrap.querySelectorAll('.run-row').forEach(row => {
        row.addEventListener('click', () => {
          const id = row.dataset.id;
          const detail = wrap.querySelector(`[data-segments-for="${id}"]`);
          if (detail) detail.classList.toggle('show');
        });
      });
    }

    function renderSegmentDetail(segs, run) {
      let body = '';
      if (segs.length) {
        body += `
          <table class="seg-mini-table">
            <thead>
              <tr><th>#</th><th>Type</th><th class="num">Distance</th><th class="num">Time</th><th class="num">Pace</th></tr>
            </thead>
            <tbody>
              ${segs.map((s, i) => {
                const d = s.distance_miles ? Number(s.distance_miles) : 0;
                const t = s.duration_seconds ? Number(s.duration_seconds) : 0;
                const p = (d > 0 && t > 0) ? t / d : null;
                return `
                  <tr>
                    <td>${s.segment_order || i+1}</td>
                    <td><span class="seg-pill seg-${s.segment_type}">${s.segment_type}</span></td>
                    <td class="num">${d ? formatMiles(d) + ' mi' : '—'}</td>
                    <td class="num">${t ? formatDuration(t) : '—'}</td>
                    <td class="num">${formatPace(p)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
      } else {
        body += '<div style="color:var(--slate-2);font-size:0.9rem;font-style:italic;">No segments recorded.</div>';
      }
      const extras = [];
      if (run.route) extras.push(`Route: ${escapeHtml(run.route)}`);
      if (run.shoes) extras.push(`Shoes: ${escapeHtml(run.shoes)}`);
      if (run.avg_cadence) extras.push(`Cadence: ${run.avg_cadence} spm`);
      if (run.avg_hr) extras.push(`Avg HR: ${run.avg_hr}`);
      if (run.max_hr) extras.push(`Max HR: ${run.max_hr}`);
      if (run.temperature_f != null) extras.push(`${run.temperature_f}°F`);
      if (run.dewpoint_f != null) extras.push(`Dew ${run.dewpoint_f}°F`);
      if (run.humidity_percent != null) extras.push(`${run.humidity_percent}% hum`);
      if (run.wind_mph != null) extras.push(`Wind ${run.wind_mph} mph`);
      if (run.conditions) extras.push(escapeHtml(run.conditions));
      if (extras.length) {
        body += `<div style="margin-top:0.6rem;font-size:0.85rem;color:var(--slate);">${extras.join(' · ')}</div>`;
      }
      if (run.notes) {
        body += `<div class="run-notes">${escapeHtml(run.notes)}</div>`;
      }
      return body;
    }

    document.querySelectorAll('.range-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(x => x.classList.toggle('active', x === b));
        activeRange = b.dataset.range;
        loadRuns();
      });
    });

    (async () => {
      const coach = await requireCoach();
      if (!coach) return;
      document.getElementById('user-name').textContent = coach.first_name + ' ' + coach.last_name.charAt(0) + '.';
      const ath = await loadAthlete();
      if (!ath) return;
      loadRuns();
    })();
  </script>
</body>
</html>
