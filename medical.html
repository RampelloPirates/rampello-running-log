<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Medical — Tally</title>
  <meta name="theme-color" content="#3A5A40">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tally">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#F4F1E9; --surface:#FFFFFF; --surface-warm:#FBF9F3; --ink:#1E241C;
      --muted:#71776B; --green:#3A5A40; --green-deep:#2C4530; --amber:#BE722A;
      --border:#E2DCCF; --green-tint:#EBF0E8; --danger:#A8443A; --amber-tint:#FBF0E2;
      --f-display:'Space Grotesk',system-ui,sans-serif;
      --f-body:'Inter',system-ui,sans-serif;
      --f-mono:'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{overflow-x:hidden;}
    body{margin:0;font-family:var(--f-body);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;}
    input:focus,textarea:focus,select:focus,button:focus-visible{outline:2px solid var(--green);outline-offset:1px;}
    .wrap{max-width:600px;margin:0 auto;padding:0 16px 48px;}
    header{padding:22px 0 14px;}
    .home-back{display:inline-block;font-size:13px;color:var(--muted);text-decoration:none;font-weight:600;margin-bottom:8px;}
    .logo{font-family:var(--f-display);font-size:20px;font-weight:700;margin:0;letter-spacing:-.3px;color:var(--green-deep);}
    .logo span{color:var(--amber);}
    .logo small{display:block;font-family:var(--f-body);font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.5px;margin-top:2px;}

    .tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--surface-warm);padding:4px;border-radius:12px;border:1px solid var(--border);}
    .tab{flex:1;font-family:var(--f-body);font-weight:600;font-size:13.5px;padding:9px;border-radius:9px;border:none;
         background:transparent;color:var(--muted);cursor:pointer;}
    .tab.on{background:var(--surface);color:var(--green-deep);box-shadow:0 1px 3px rgba(44,69,48,.1);}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
    .row-between{display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .kicker{font-family:var(--f-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .h2{font-family:var(--f-display);font-size:15px;margin:2px 0 10px;}
    .p{font-size:13px;color:var(--muted);margin:0 0 12px;line-height:1.5;}
    .fine{font-size:11px;color:var(--muted);text-align:center;line-height:1.5;}
    .empty{font-size:13px;color:var(--muted);font-style:italic;margin:0;}
    .loading{text-align:center;color:var(--muted);padding:50px 0;font-size:14px;}
    .err{color:var(--danger);font-size:13px;margin:10px 0 0;}
    .ok{color:var(--green);font-size:13px;margin:10px 0 0;}

    .btn{font-family:var(--f-body);font-weight:600;font-size:14px;border-radius:10px;cursor:pointer;border:1px solid transparent;padding:11px 16px;width:100%;}
    .btn:disabled{opacity:.45;cursor:default;}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-ghost{background:transparent;color:var(--green);border:1px solid var(--border);}
    .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--border);}
    .btn-sm{width:auto;padding:7px 12px;font-size:13px;}
    /* min-width:0 and max-width:100% are load-bearing, not decoration. A date
       input has a big intrinsic width (iOS especially), and a grid item defaults
       to min-width:auto — so without these it refuses to shrink below its
       natural size and spills over the column next to it. */
    .field{font-family:var(--f-body);font-size:14px;color:var(--ink);border:1px solid var(--border);
           border-radius:10px;padding:10px;background:var(--surface-warm);
           width:100%;min-width:0;max-width:100%;-webkit-appearance:none;appearance:none;}
    input[type="date"].field{min-height:42px;}   /* iOS collapses these without it */
    select.field{-webkit-appearance:none;appearance:none;
                 background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
                 background-position:calc(100% - 16px) 19px, calc(100% - 11px) 19px;
                 background-size:5px 5px, 5px 5px;background-repeat:no-repeat;padding-right:30px;}
    textarea.field{resize:vertical;min-height:64px;}
    label.lb{display:block;font-family:var(--f-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:10px 0 4px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .grid2>*{min-width:0;}
    /* Two date/number fields side by side get genuinely cramped on a narrow
       phone. Below 380px they stack rather than fight. */
    @media (max-width:379px){ .grid2{grid-template-columns:1fr;} }

    /* The HSA headline */
    .headline{background:var(--green-deep);color:#fff;border-radius:16px;padding:20px;margin-bottom:14px;}
    .headline .amt{font-family:var(--f-display);font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1;}
    .headline .lbl{font-size:12px;opacity:.8;margin-top:6px;line-height:1.45;}
    .headline .sub{font-family:var(--f-mono);font-size:11px;opacity:.65;margin-top:10px;}

    .item{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;background:var(--surface-warm);}
    .item .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
    /* A long provider name ("Bay Area Orthopaedic Associates") must wrap rather
       than shove the amount and the × off the edge. */
    .item .top>div:first-child{flex:1;min-width:0;}
    .item .nm{font-weight:600;font-size:14px;min-width:0;overflow-wrap:anywhere;}
    .item .ct{font-family:var(--f-mono);font-size:11px;color:var(--muted);margin-top:3px;overflow-wrap:anywhere;}
    .item .amt{font-family:var(--f-mono);font-size:14px;font-weight:600;white-space:nowrap;}
    .pill{white-space:nowrap;}
    .item .dl{font-size:12.5px;margin-top:8px;line-height:1.5;}
    .item .dl b{font-weight:600;}
    .x{background:none;border:none;color:var(--muted);font-size:19px;line-height:1;cursor:pointer;padding:2px 6px;flex-shrink:0;}
    .x:hover{color:var(--danger);}

    .pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;font-family:var(--f-mono);}
    .pill.done{background:var(--green-tint);color:var(--green-deep);}
    .pill.open{background:var(--amber-tint);color:var(--amber);}
    .pill.warn{background:#F3E4E2;color:var(--danger);}

    .flag{font-size:12px;padding:9px 11px;border-radius:9px;margin-top:8px;line-height:1.45;
          background:#F3E4E2;color:var(--danger);border-left:2px solid var(--danger);}
    .flag.soft{background:var(--amber-tint);color:#8A5219;border-left-color:var(--amber);}
    .thumb{margin-top:9px;}
    .thumb a{font-size:12px;color:var(--green);font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <div class="wrap"><div id="app"><div class="loading">Loading…</div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
  var VISIT_TYPES = [
    ['physical','Physical / wellness'], ['sick','Sick visit'], ['specialist','Specialist'],
    ['follow_up','Follow-up'], ['urgent_care','Urgent care'], ['er','ER'],
    ['dental','Dental'], ['vision','Vision'], ['imaging','Imaging'], ['labs','Labs'],
    ['therapy','Physical therapy'], ['mental_health','Mental health'],
    ['procedure','Procedure / surgery'], ['vaccination','Vaccination'],
    ['telehealth','Telehealth'], ['other','Other']
  ];
  var CATEGORIES = [
    ['office_visit','Office visit'], ['prescription','Prescription'], ['dental','Dental'],
    ['vision','Vision'], ['lab','Lab'], ['imaging','Imaging'], ['procedure','Procedure'],
    ['otc','OTC / supplies'], ['mileage','Mileage'], ['other','Other']
  ];

  var S = { loaded:false, userId:null, tab:'visits',
            visits:[], expenses:[], hsa:{ established_on:null, mileage_rate:0.21 },
            draft:null, draftKind:null, draftFile:null,   // the reviewed-before-save extraction
            openId:null, busy:false, err:'', msg:'' };

  function el(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function money(n){ return n==null ? '—' : '$'+Number(n).toFixed(2); }
  function label(list, v){ var f = list.find(function(x){ return x[0]===v; }); return f?f[1]:(v||'—'); }
  function fmt(d){ if(!d) return '—';
    return new Date(d+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

  // Everyone who's appeared on a visit or an expense — offered as suggestions so
  // "Sarah" doesn't become "sarah" and then a second person.
  function people(){
    var s = {};
    S.visits.forEach(function(v){ if(v.person) s[v.person]=1; });
    S.expenses.forEach(function(e){ if(e.person) s[e.person]=1; });
    s['Me']=1;
    return Object.keys(s);
  }

  // ── Data ──────────────────────────────────────────────────────────────────
  async function callMedical(body){
    var s = await sb.auth.getSession();
    var res = await fetch(SUPABASE_URL+'/functions/v1/medical', {
      method:'POST',
      headers:{ 'Content-Type':'application/json',
                'Authorization':'Bearer '+s.data.session.access_token },
      body: JSON.stringify(body)
    });
    var out = await res.json();
    if(!res.ok) throw new Error(out.error || 'Something went wrong.');
    return out;
  }

  async function loadAll(){
    var v = await sb.from('medical_visits').select('*').order('visit_date',{ascending:false});
    S.visits = v.data || [];
    var e = await sb.from('medical_expenses').select('*').order('service_date',{ascending:false});
    S.expenses = e.data || [];
    var h = await sb.from('hsa_settings').select('*').eq('user_id',S.userId).maybeSingle();
    if(h.data) S.hsa = h.data;
  }

  function toBase64(file){
    return new Promise(function(res, rej){
      var r = new FileReader();
      r.onload = function(){ res(String(r.result).split(',')[1]); };
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  // The photo IS the documentation — for the HSA half, extracted text is the
  // convenience and the image is the asset. Upload before the row is written so
  // we never end up with a claim whose evidence went missing.
  async function upload(file){
    var ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    var path = S.userId+'/'+crypto.randomUUID()+'.'+ext;
    var up = await sb.storage.from('medical').upload(path, file, { upsert:false });
    if(up.error) throw up.error;
    return path;
  }

  async function viewImage(path){
    var r = await sb.storage.from('medical').createSignedUrl(path, 3600);
    if(r.data && r.data.signedUrl) window.open(r.data.signedUrl, '_blank');
  }

  // ── Snap → extract → review ───────────────────────────────────────────────
  // Never save straight from the extraction. This is a medical record and a tax
  // document; a misread date or a billed-vs-paid mixup is exactly what you'd
  // want to catch, and you can only catch it if you're shown it first.
  async function snap(kind, file){
    if(!file || S.busy) return;
    S.busy=true; S.err=''; S.msg=''; render();
    try{
      var b64 = await toBase64(file);
      var out = await callMedical({ mode:kind, image:b64 });
      S.draft = out; S.draftKind = kind; S.draftFile = file;
      if(!S.draft.person) S.draft.person = 'Me';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  function cancelDraft(){ S.draft=null; S.draftKind=null; S.draftFile=null; S.err=''; render(); }
  function d(k, v){ S.draft[k] = v; }

  async function saveVisit(){
    var v = S.draft;
    if(!v.visit_date){ S.err='A visit needs a date.'; render(); return; }
    S.busy=true; S.err=''; render();
    try{
      var path = await upload(S.draftFile);
      var r = await sb.from('medical_visits').insert({
        user_id:S.userId, person:v.person||'Me', visit_date:v.visit_date,
        visit_type:v.visit_type, provider:v.provider, specialty:v.specialty,
        facility:v.facility, reason:v.reason, diagnosis:v.diagnosis,
        treatment:v.treatment, instructions:v.instructions, referrals:v.referrals,
        follow_up_on:v.follow_up_on||null, follow_up_note:v.follow_up_note,
        image_path:path
      }).select('*').single();
      if(r.error) throw r.error;

      var extra = [];

      // Vitals measured at the visit belong in Vitals, not buried in a photo.
      // Only for you — the Vitals module has no notion of other people.
      if((v.vitals||[]).length && (v.person||'Me')==='Me'){
        var rows = v.vitals.map(function(x){
          return { user_id:S.userId, measured_on:v.visit_date, kind:x.kind,
                   value:x.value, value2:x.value2, unit:x.unit,
                   source:'Visit — '+(v.provider||'doctor'),
                   import_ref:'visit:'+r.data.id+':'+x.kind };   // dedupe if re-saved
        });
        var vr = await sb.from('vitals').upsert(rows, { onConflict:'user_id,import_ref' });
        if(!vr.error) extra.push(v.vitals.length+' vital'+(v.vitals.length===1?'':'s')+' → Vitals');
      }

      // Prescriptions join the daily checklist, and fall off it when the course
      // ends — ends_on is what keeps a 10-day antibiotic from living there forever.
      if((v.prescriptions||[]).length && (v.person||'Me')==='Me'){
        var meds = v.prescriptions.map(function(p){
          var ends = null;
          if(p.duration_days){
            var dt = new Date(v.visit_date+'T12:00:00');
            dt.setDate(dt.getDate() + p.duration_days);
            ends = dt.toISOString().slice(0,10);
          }
          return { user_id:S.userId, name:p.name, dose:p.dose, timing:'Anytime',
                   kind:'prescription', prescribed_on:v.visit_date, ends_on:ends,
                   prescriber:v.provider, visit_id:r.data.id };
        });
        var mr = await sb.from('supplements').insert(meds);
        if(!mr.error) extra.push(meds.length+' prescription'+(meds.length===1?'':'s')+' → Supplements');
      }

      await loadAll();
      S.draft=null; S.draftFile=null;
      S.msg = 'Visit saved.' + (extra.length ? ' ' + extra.join(', ') + '.' : '');
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  async function saveExpense(){
    var x = S.draft;
    if(!x.service_date){ S.err='An expense needs a date of service.'; render(); return; }
    S.busy=true; S.err=''; render();
    try{
      var path = await upload(S.draftFile);
      var r = await sb.from('medical_expenses').insert({
        user_id:S.userId, person:x.person||'Me', service_date:x.service_date,
        provider:x.provider, category:x.category, doc_kind:x.doc_kind,
        billed_amount:x.billed_amount, paid_amount:x.paid_amount,
        note:x.note, image_path:path
      });
      if(r.error) throw r.error;
      await loadAll();
      S.draft=null; S.draftFile=null;
      S.msg = 'Expense filed.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  async function toggleReimbursed(id){
    var x = S.expenses.find(function(e){ return e.id===id; });
    var now = !x.reimbursed;
    await sb.from('medical_expenses').update({
      reimbursed: now, reimbursed_on: now ? new Date().toISOString().slice(0,10) : null
    }).eq('id', id);
    x.reimbursed = now;
    x.reimbursed_on = now ? new Date().toISOString().slice(0,10) : null;
    render();
  }

  async function removeVisit(id){
    if(!confirm('Delete this visit? The photo goes too.')) return;
    var v = S.visits.find(function(x){ return x.id===id; });
    if(v && v.image_path) await sb.storage.from('medical').remove([v.image_path]);
    await sb.from('medical_visits').delete().eq('id', id);
    await loadAll(); render();
  }

  async function removeExpense(id){
    if(!confirm('Delete this expense? The receipt goes too — if it\'s unreimbursed, you lose the documentation.')) return;
    var x = S.expenses.find(function(e){ return e.id===id; });
    if(x && x.image_path) await sb.storage.from('medical').remove([x.image_path]);
    await sb.from('medical_expenses').delete().eq('id', id);
    await loadAll(); render();
  }

  async function saveHsa(){
    var est = el('hsa-est').value || null;
    var rate = parseFloat(el('hsa-rate').value) || 0.21;
    await sb.from('hsa_settings').upsert({
      user_id:S.userId, established_on:est, mileage_rate:rate,
      updated_at:new Date().toISOString()
    });
    S.hsa = { established_on:est, mileage_rate:rate };
    S.msg = 'Saved.'; render();
  }

  async function addMileage(){
    var miles = parseFloat(el('mi-miles').value);
    var date = el('mi-date').value;
    var prov = el('mi-prov').value.trim();
    if(!miles || !date){ S.err='Miles and a date, at least.'; render(); return; }
    S.busy=true; S.err=''; render();
    try{
      var amt = Math.round(miles * S.hsa.mileage_rate * 100)/100;
      var r = await sb.from('medical_expenses').insert({
        user_id:S.userId, person:'Me', service_date:date, provider:prov||null,
        category:'mileage', miles:miles, paid_amount:amt, doc_kind:'receipt',
        note:miles+' miles @ $'+S.hsa.mileage_rate+'/mi'
      });
      if(r.error) throw r.error;
      await loadAll();
      S.msg = 'Added '+money(amt)+' of mileage.';
    }catch(e){ S.err = e.message; }
    S.busy=false; render();
  }

  // ── Render: drafts ────────────────────────────────────────────────────────
  function peopleList(){
    return '<datalist id="ppl">'+people().map(function(p){
      return '<option value="'+esc(p)+'">'; }).join('')+'</datalist>';
  }

  function draftVisit(){
    var v = S.draft;
    var h = '<section class="card"><h2 class="h2">Check this before it\'s filed</h2>'+
      '<p class="p">Read off your photo. A wrong date or a misread diagnosis is worth catching now — this is a medical record.</p>'+
      peopleList()+
      '<div class="grid2">'+
        '<div><label class="lb">Visit date</label><input class="field" type="date" value="'+esc(v.visit_date||'')+'" onchange="d(\'visit_date\',this.value)"></div>'+
        '<div><label class="lb">Who</label><input class="field" list="ppl" value="'+esc(v.person||'Me')+'" oninput="d(\'person\',this.value)"></div>'+
      '</div>'+
      '<label class="lb">Type</label><select class="field" onchange="d(\'visit_type\',this.value)">'+
        VISIT_TYPES.map(function(t){
          return '<option value="'+t[0]+'"'+(v.visit_type===t[0]?' selected':'')+'>'+t[1]+'</option>';
        }).join('')+'</select>'+
      '<div class="grid2">'+
        '<div><label class="lb">Doctor seen</label><input class="field" value="'+esc(v.provider||'')+'" oninput="d(\'provider\',this.value)"></div>'+
        '<div><label class="lb">Specialty</label><input class="field" value="'+esc(v.specialty||'')+'" oninput="d(\'specialty\',this.value)"></div>'+
      '</div>'+
      '<label class="lb">Facility</label><input class="field" value="'+esc(v.facility||'')+'" oninput="d(\'facility\',this.value)">'+
      '<label class="lb">Reason for visit</label><input class="field" value="'+esc(v.reason||'')+'" oninput="d(\'reason\',this.value)">'+
      '<label class="lb">Diagnosis</label><textarea class="field" oninput="d(\'diagnosis\',this.value)">'+esc(v.diagnosis||'')+'</textarea>'+
      '<label class="lb">Treatment</label><textarea class="field" oninput="d(\'treatment\',this.value)">'+esc(v.treatment||'')+'</textarea>'+
      '<label class="lb">Instructions</label><textarea class="field" oninput="d(\'instructions\',this.value)">'+esc(v.instructions||'')+'</textarea>'+
      '<div class="grid2">'+
        '<div><label class="lb">Follow-up due</label><input class="field" type="date" value="'+esc(v.follow_up_on||'')+'" onchange="d(\'follow_up_on\',this.value)"></div>'+
        '<div><label class="lb">Follow-up note</label><input class="field" value="'+esc(v.follow_up_note||'')+'" oninput="d(\'follow_up_note\',this.value)"></div>'+
      '</div>';

    if((v.vitals||[]).length){
      h += '<div class="flag soft"><b>'+v.vitals.length+' vital'+(v.vitals.length===1?'':'s')+'</b> on this summary — '+
        v.vitals.map(function(x){
          return esc(x.kind.replace('_',' '))+' '+x.value+(x.value2?'/'+x.value2:'');
        }).join(', ')+
        '. '+((v.person||'Me')==='Me' ? 'These will be added to Vitals.' : 'Not added — Vitals only tracks you.')+'</div>';
    }
    if((v.prescriptions||[]).length){
      h += '<div class="flag soft"><b>'+v.prescriptions.length+' prescription'+(v.prescriptions.length===1?'':'s')+'</b> — '+
        v.prescriptions.map(function(p){
          return esc(p.name)+(p.duration_days?' ('+p.duration_days+'d)':'');
        }).join(', ')+
        '. '+((v.person||'Me')==='Me'
          ? 'These join your Supplements checklist and drop off when the course ends.'
          : 'Not added — Supplements only tracks you.')+'</div>';
    }

    if(S.err) h += '<p class="err">'+esc(S.err)+'</p>';
    h += '<div style="display:flex;gap:8px;margin-top:14px">'+
      '<button class="btn btn-primary" onclick="saveVisit()"'+(S.busy?' disabled':'')+'>'+
        (S.busy?'Saving…':'Save visit')+'</button>'+
      '<button class="btn btn-ghost" onclick="cancelDraft()">Cancel</button></div></section>';
    return h;
  }

  function draftExpense(){
    var x = S.draft;
    var h = '<section class="card"><h2 class="h2">Check this before it\'s filed</h2>'+
      '<p class="p">This is the record you\'d rely on years from now. Worth ten seconds.</p>'+
      peopleList()+
      '<div class="grid2">'+
        '<div><label class="lb">Date of service</label><input class="field" type="date" value="'+esc(x.service_date||'')+'" onchange="d(\'service_date\',this.value)"></div>'+
        '<div><label class="lb">Who</label><input class="field" list="ppl" value="'+esc(x.person||'Me')+'" oninput="d(\'person\',this.value)"></div>'+
      '</div>'+
      '<label class="lb">Provider</label><input class="field" value="'+esc(x.provider||'')+'" oninput="d(\'provider\',this.value)">'+
      '<div class="grid2">'+
        '<div><label class="lb">Category</label><select class="field" onchange="d(\'category\',this.value)">'+
          CATEGORIES.map(function(c){
            return '<option value="'+c[0]+'"'+(x.category===c[0]?' selected':'')+'>'+c[1]+'</option>';
          }).join('')+'</select></div>'+
        '<div><label class="lb">Document</label><select class="field" onchange="d(\'doc_kind\',this.value)">'+
          [['receipt','Receipt (paid)'],['eob','EOB'],['bill','Bill (unpaid)'],['statement','Statement']]
            .map(function(c){
              return '<option value="'+c[0]+'"'+(x.doc_kind===c[0]?' selected':'')+'>'+c[1]+'</option>';
            }).join('')+'</select></div>'+
      '</div>'+
      '<div class="grid2">'+
        '<div><label class="lb">Billed</label><input class="field" type="number" step="0.01" value="'+(x.billed_amount==null?'':x.billed_amount)+'" oninput="d(\'billed_amount\', this.value===\'\'?null:parseFloat(this.value))"></div>'+
        '<div><label class="lb">You paid</label><input class="field" type="number" step="0.01" value="'+(x.paid_amount==null?'':x.paid_amount)+'" oninput="d(\'paid_amount\', this.value===\'\'?null:parseFloat(this.value))"></div>'+
      '</div>'+
      '<label class="lb">Note</label><input class="field" value="'+esc(x.note||'')+'" oninput="d(\'note\',this.value)">';

    // The two things that make a receipt worthless. Both are silent failures if
    // you don't say them out loud at the moment of filing.
    if(x.doc_kind==='bill'){
      h += '<div class="flag">This is a <b>bill</b>, not proof of payment. A bill alone doesn\'t substantiate an HSA reimbursement — you\'ll want the receipt or EOB once it\'s paid.</div>';
    }
    if(!x.paid_amount){
      h += '<div class="flag soft">No out-of-pocket amount. Only what <b>you paid</b> counts toward your reimbursable balance — the billed amount doesn\'t.</div>';
    }
    if(S.hsa.established_on && x.service_date && x.service_date < S.hsa.established_on){
      h += '<div class="flag">This is dated <b>before your HSA was opened</b> ('+fmt(S.hsa.established_on)+'). Expenses incurred before the account existed can never be reimbursed from it.</div>';
    }

    if(S.err) h += '<p class="err">'+esc(S.err)+'</p>';
    h += '<div style="display:flex;gap:8px;margin-top:14px">'+
      '<button class="btn btn-primary" onclick="saveExpense()"'+(S.busy?' disabled':'')+'>'+
        (S.busy?'Filing…':'File it')+'</button>'+
      '<button class="btn btn-ghost" onclick="cancelDraft()">Cancel</button></div></section>';
    return h;
  }

  // ── Render: tabs ──────────────────────────────────────────────────────────
  function visitsTab(){
    var h = '';

    // Follow-ups first — this is the bit with consequences.
    var today = new Date().toISOString().slice(0,10);
    var due = S.visits.filter(function(v){ return v.follow_up_on && v.follow_up_on >= today; })
      .sort(function(a,b){ return a.follow_up_on.localeCompare(b.follow_up_on); });
    if(due.length){
      h += '<section class="card"><h2 class="h2">Coming up</h2>'+
        due.map(function(v){
          return '<div class="item"><div class="top"><div style="min-width:0">'+
            '<div class="nm">'+esc(v.follow_up_note || 'Follow-up')+'</div>'+
            '<div class="ct">'+fmt(v.follow_up_on)+' · '+esc(v.provider||'—')+' · '+esc(v.person)+'</div>'+
            '</div></div></div>';
        }).join('')+'</section>';
    }

    h += '<section class="card"><h2 class="h2">Log a visit</h2>'+
      '<p class="p">Photograph the after-visit summary. Vitals and prescriptions on it get pulled out and sent where they belong.</p>'+
      '<input id="vfile" type="file" accept="image/*" style="display:none" onchange="snap(\'visit\', this.files[0])">'+
      '<button class="btn btn-primary" onclick="el(\'vfile\').click()"'+(S.busy?' disabled':'')+'>'+
        (S.busy?'Reading…':'📷 Photograph the summary')+'</button>';
    if(S.err && !S.draft) h += '<p class="err">'+esc(S.err)+'</p>';
    if(S.msg) h += '<p class="ok">'+esc(S.msg)+'</p>';
    h += '</section>';

    h += '<section class="card"><h2 class="h2">Visits</h2>';
    if(!S.visits.length){
      h += '<p class="empty">Nothing logged yet.</p>';
    }else{
      h += S.visits.map(function(v){
        var open = S.openId===v.id;
        var hh = '<div class="item"><div class="top" style="cursor:pointer" onclick="S.openId='+
          (open?'null':'\''+v.id+'\'')+';render()">'+
          '<div style="min-width:0">'+
            '<div class="nm">'+esc(label(VISIT_TYPES, v.visit_type))+
              (v.provider?' · '+esc(v.provider):'')+'</div>'+
            '<div class="ct">'+fmt(v.visit_date)+' · '+esc(v.person)+
              (v.facility?' · '+esc(v.facility):'')+'</div>'+
          '</div>'+
          '<span class="ct">'+(open?'▾':'▸')+'</span></div>';
        if(open){
          hh += '<div class="dl">'+
            (v.reason?'<div><b>Reason:</b> '+esc(v.reason)+'</div>':'')+
            (v.diagnosis?'<div><b>Diagnosis:</b> '+esc(v.diagnosis)+'</div>':'')+
            (v.treatment?'<div><b>Treatment:</b> '+esc(v.treatment)+'</div>':'')+
            (v.instructions?'<div><b>Instructions:</b> '+esc(v.instructions)+'</div>':'')+
            (v.referrals?'<div><b>Referrals:</b> '+esc(v.referrals)+'</div>':'')+
            '</div>'+
            (v.image_path?'<div class="thumb"><a href="#" onclick="viewImage(\''+v.image_path+'\');return false">View the summary →</a></div>':'')+
            '<div style="margin-top:10px"><button class="btn btn-danger btn-sm" onclick="removeVisit(\''+v.id+'\')">Delete</button></div>';
        }
        return hh+'</div>';
      }).join('');
    }
    return h + '</section>';
  }

  function hsaTab(){
    // The number this whole tab exists to produce: documented, un-reimbursed,
    // not deducted — i.e. what you could withdraw from the HSA tax-free today.
    var claimable = S.expenses.filter(function(e){ return !e.reimbursed && !e.tax_deducted && e.paid_amount; });
    var total = claimable.reduce(function(s,e){ return s + Number(e.paid_amount); }, 0);
    var undocumented = S.expenses.filter(function(e){ return !e.reimbursed && !e.paid_amount; }).length;

    var h = '<div class="headline">'+
      '<div class="amt">'+money(total)+'</div>'+
      '<div class="lbl">Documented, un-reimbursed. You can withdraw this from the HSA tax-free whenever you like — there\'s no deadline, as long as you keep the receipts.</div>'+
      '<div class="sub">'+claimable.length+' expense'+(claimable.length===1?'':'s')+
        (undocumented ? ' · '+undocumented+' with no paid amount' : '')+'</div></div>';

    h += '<section class="card"><h2 class="h2">File a receipt</h2>'+
      '<p class="p">A receipt or EOB showing what <b>you paid</b>. The photo is kept — extracted text isn\'t what substantiates a claim, the document is.</p>'+
      '<input id="efile" type="file" accept="image/*" style="display:none" onchange="snap(\'expense\', this.files[0])">'+
      '<button class="btn btn-primary" onclick="el(\'efile\').click()"'+(S.busy?' disabled':'')+'>'+
        (S.busy?'Reading…':'📷 Photograph the receipt')+'</button>';
    if(S.err && !S.draft) h += '<p class="err">'+esc(S.err)+'</p>';
    if(S.msg) h += '<p class="ok">'+esc(S.msg)+'</p>';
    h += '</section>';

    // Mileage: qualified, per-mile, and nobody tracks it because nobody has a
    // place to put it. You do now.
    h += '<section class="card"><h2 class="h2">Mileage</h2>'+
      '<p class="p">Driving to appointments is a qualified expense at $'+S.hsa.mileage_rate+'/mile. It adds up and almost nobody claims it.</p>'+
      '<div class="grid2">'+
        '<div><label class="lb">Date</label><input class="field" id="mi-date" type="date"></div>'+
        '<div><label class="lb">Miles (round trip)</label><input class="field" id="mi-miles" type="number" step="0.1"></div>'+
      '</div>'+
      '<label class="lb">Where to</label><input class="field" id="mi-prov" placeholder="Dr. Patel\'s office">'+
      '<button class="btn btn-ghost" style="margin-top:12px" onclick="addMileage()"'+(S.busy?' disabled':'')+'>Add mileage</button>'+
      '</section>';

    h += '<section class="card"><h2 class="h2">Expenses</h2>';
    if(!S.expenses.length){
      h += '<p class="empty">Nothing filed yet.</p>';
    }else{
      h += S.expenses.map(function(e){
        var stale = S.hsa.established_on && e.service_date < S.hsa.established_on;
        return '<div class="item"><div class="top">'+
          '<div style="min-width:0">'+
            '<div class="nm">'+esc(e.provider || label(CATEGORIES, e.category))+'</div>'+
            '<div class="ct">'+fmt(e.service_date)+' · '+esc(label(CATEGORIES,e.category))+' · '+esc(e.person)+'</div>'+
            '<div style="margin-top:6px">'+
              (e.reimbursed
                ? '<span class="pill done">reimbursed '+fmt(e.reimbursed_on)+'</span>'
                : '<span class="pill open">claimable</span>')+
              (e.doc_kind==='bill' ? ' <span class="pill warn">bill only</span>' : '')+
              (stale ? ' <span class="pill warn">pre-dates HSA</span>' : '')+
            '</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div class="amt">'+money(e.paid_amount)+'</div>'+
            (e.billed_amount!=null && e.billed_amount!==e.paid_amount
              ? '<div class="ct">billed '+money(e.billed_amount)+'</div>' : '')+
          '</div>'+
          '<button class="x" onclick="removeExpense(\''+e.id+'\')" title="Delete">×</button>'+
          '</div>'+
          '<div style="display:flex;gap:8px;margin-top:9px;align-items:center">'+
            '<button class="btn btn-ghost btn-sm" onclick="toggleReimbursed(\''+e.id+'\')">'+
              (e.reimbursed?'Mark un-reimbursed':'Mark reimbursed')+'</button>'+
            (e.image_path?'<a href="#" style="font-size:12px;color:var(--green);font-weight:600;text-decoration:none" onclick="viewImage(\''+e.image_path+'\');return false">View →</a>':'')+
          '</div>'+
          '</div>';
      }).join('');
    }
    h += '</section>';

    h += '<section class="card"><h2 class="h2">HSA setup</h2>'+
      '<p class="p">An expense incurred <b>before</b> the account was opened can never be reimbursed from it. Set the date and the app will flag any receipt that pre-dates it.</p>'+
      '<div class="grid2">'+
        '<div><label class="lb">HSA opened</label><input class="field" id="hsa-est" type="date" value="'+esc(S.hsa.established_on||'')+'"></div>'+
        '<div><label class="lb">Mileage rate ($/mi)</label><input class="field" id="hsa-rate" type="number" step="0.001" value="'+S.hsa.mileage_rate+'"></div>'+
      '</div>'+
      '<button class="btn btn-ghost" style="margin-top:12px" onclick="saveHsa()">Save</button>'+
      '</section>';

    h += '<p class="fine">Tally keeps the records; it isn\'t tax advice. Worth confirming the details with whoever does your return before you rely on them.</p>';
    return h;
  }

  function render(){
    var app = el('app');
    if(!S.loaded){ app.innerHTML='<div class="loading">Loading…</div>'; return; }

    var h = '<header><a href="home.html" class="home-back">‹ Home</a>'+
      '<h1 class="logo">Tally<span>.</span><small>Medical</small></h1></header>';

    h += '<div class="tabs">'+
      '<button class="tab'+(S.tab==='visits'?' on':'')+'" onclick="S.tab=\'visits\';S.err=\'\';S.msg=\'\';render()">Visits</button>'+
      '<button class="tab'+(S.tab==='hsa'?' on':'')+'" onclick="S.tab=\'hsa\';S.err=\'\';S.msg=\'\';render()">HSA</button>'+
      '</div>';

    // A draft takes over the screen — it's a decision, not a background task.
    if(S.draft){
      app.innerHTML = h + (S.draftKind==='visit' ? draftVisit() : draftExpense());
      return;
    }

    app.innerHTML = h + (S.tab==='visits' ? visitsTab() : hsaTab());
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  (async function(){
    var u = await requireUser(); if(!u) return;
    S.userId = u.user.id;
    await loadAll();
    S.loaded = true;
    render();
  })();
  </script>
</body>
</html>
